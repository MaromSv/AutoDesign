<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AutoDesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --paper:   #f7f2ea;
      --paper-2: #efe7d8;
      --rule:    #1c1814;
      --ink:     #1c1814;
      --ink-2:   #5b554d;
      --ink-3:   #8c867c;
      --accent:  #b8480f;   /* terracotta */
      --accent-soft: #e9c8a8;
      --good:    #2f7a3a;
      --bad:     #b53b3b;
      --serif:   "Fraunces", ui-serif, Georgia, serif;
      --sans:    "Inter", ui-sans-serif, system-ui, sans-serif;
      --mono:    "JetBrains Mono", ui-monospace, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--paper); color: var(--ink);
      font-family: var(--sans); font-size: 15px; line-height: 1.55;
    }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid currentColor; }
    a:hover { color: var(--ink); }
    button { font: inherit; }

    /* ---- top bar (editorial masthead) ----------------------------------- */
    header.masthead {
      border-bottom: 1px solid var(--rule);
      padding: 18px 36px 16px;
      display: grid; grid-template-columns: auto 1fr auto; align-items: end; gap: 24px;
      background: var(--paper);
    }
    .wordmark {
      font-family: var(--serif); font-weight: 500;
      font-size: 32px; letter-spacing: -0.01em; line-height: 1;
    }
    .wordmark em { font-style: italic; color: var(--accent); font-weight: 500; }
    .nav { display: flex; gap: 0; align-self: end; }
    .nav button {
      background: transparent; border: 0; padding: 6px 16px 10px;
      font-family: var(--serif); font-size: 16px; color: var(--ink-3);
      cursor: pointer; border-bottom: 2px solid transparent;
      letter-spacing: 0.01em;
    }
    .nav button:hover { color: var(--ink); }
    .nav button.active {
      color: var(--ink); border-bottom-color: var(--accent);
    }
    .meta { font-family: var(--mono); font-size: 11px; color: var(--ink-3); text-align: right; }
    .meta select {
      background: transparent; color: var(--ink); border: 0;
      font: inherit; padding: 0; cursor: pointer;
      border-bottom: 1px dashed var(--ink-3);
    }
    .meta .stat { display: block; margin-top: 4px; }

    main { padding: 0; }

    /* ---- generic layout ------------------------------------------------- */
    .spread { padding: 36px 48px; max-width: 1400px; margin-inline: auto; }
    .spread.narrow { max-width: 900px; }

    .eyebrow {
      font-family: var(--mono); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--ink-3); margin-bottom: 12px;
    }
    .display {
      font-family: var(--serif); font-weight: 500;
      font-size: clamp(40px, 4.5vw, 64px); line-height: 1.02;
      letter-spacing: -0.015em; margin: 0;
    }
    .body-lead {
      font-family: var(--serif); font-style: italic; font-weight: 400;
      font-size: 20px; line-height: 1.4; color: var(--ink-2); margin: 12px 0 0;
      max-width: 56ch;
    }
    .empty {
      padding: 80px 24px; color: var(--ink-3); text-align: center;
      font-family: var(--serif); font-size: 18px; font-style: italic;
    }

    /* ============================================================ */
    /* PAGE 1 — EVOLUTION                                            */
    /* ============================================================ */
    .evo-hero {
      display: grid; grid-template-columns: 1fr 1.7fr; gap: 56px;
      padding: 56px 48px 24px; max-width: 1500px; margin-inline: auto;
    }
    .evo-info { padding-top: 28px; }
    .evo-info .gen-label {
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink-3);
    }
    .evo-info .gen-score {
      font-family: var(--serif); font-weight: 500;
      font-size: 96px; line-height: 0.95; letter-spacing: -0.03em;
      margin: 8px 0 4px; color: var(--ink);
    }
    .evo-info .gen-score sup {
      font-size: 32px; vertical-align: top; color: var(--ink-3);
      margin-left: 6px; font-weight: 400;
    }
    .evo-info .delta {
      font-family: var(--mono); font-size: 14px; color: var(--ink-3);
    }
    .delta.pos { color: var(--good); }
    .delta.neg { color: var(--bad); }
    .delta.flat { color: var(--ink-3); }
    .evo-info .gen-headline {
      font-family: var(--serif); font-style: italic; font-weight: 400;
      font-size: 22px; line-height: 1.35; color: var(--ink-2);
      margin: 28px 0 0; max-width: 36ch;
    }
    .evo-info .gen-changed {
      font-family: var(--sans); font-size: 13px; color: var(--ink-3);
      margin-top: 16px; max-width: 42ch; line-height: 1.55;
    }
    .evo-info .gen-changed strong { color: var(--ink-2); font-weight: 600; }

    /* stage (image area) */
    .stage-shell {
      display: flex; flex-direction: column; gap: 12px;
    }
    .stage {
      position: relative; aspect-ratio: 1280 / 800;
      background: #fff; border: 1px solid var(--rule);
      overflow: hidden;
      box-shadow: 0 18px 40px -22px rgba(28,24,20,0.35);
    }
    .stage .layer {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: top;
      opacity: 0; transition: opacity 380ms ease;
      pointer-events: none;
    }
    .stage .layer.active { opacity: 1; }
    .stage .saliency-layer { mix-blend-mode: normal; }
    /* Live iframe stage layer — fixed at the page's design viewport (1280x800)
       and CSS-scaled to fit the stage box. Lets us render the candidate's
       actual HTML so its entrance animations run on every flip, instead of
       trying to autoplay a recorded webm (which browsers gate behind user
       gestures). */
    .stage .frame-layer {
      position: absolute; top: 0; left: 0;
      width: 1280px; height: 800px;
      border: 0; background: transparent;
      transform-origin: top left;
      pointer-events: none;
    }
    .stage .empty-layer {
      position: absolute; inset: 0; display: grid; place-items: center;
      color: var(--ink-3); font-family: var(--serif); font-style: italic;
    }

    /* nav arrows on the stage (visible only when there are siblings) */
    .stage .nav-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.92); color: var(--ink);
      border: 1px solid var(--rule);
      font-family: var(--serif); font-size: 24px; line-height: 1;
      cursor: pointer; display: grid; place-items: center;
      opacity: 0; transition: opacity 160ms ease;
    }
    .stage:hover .nav-arrow { opacity: 1; }
    .stage .nav-arrow:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .stage .nav-arrow.prev { left: 12px; }
    .stage .nav-arrow.next { right: 12px; }
    .stage .nav-arrow[disabled] { opacity: 0 !important; pointer-events: none; }

    /* corner badge showing which candidate is on stage */
    .stage .stage-badge {
      position: absolute; top: 12px; left: 12px;
      background: rgba(255,255,255,0.92); border: 1px solid var(--rule);
      padding: 6px 10px; font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.06em; color: var(--ink);
    }
    .stage .stage-badge .star { color: var(--accent); font-weight: 600; }
    .stage .open-live {
      position: absolute; bottom: 12px; right: 12px;
      background: var(--accent); color: #fff; border: 1px solid var(--accent);
      padding: 6px 10px; font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.04em; cursor: pointer;
    }

    /* below-stage controls bar: dots + saliency toggle + auto-play */
    .stage-bar {
      display: flex; align-items: center; gap: 20px;
      padding: 4px 0 0; flex-wrap: wrap;
    }
    .sib-dots { display: flex; align-items: center; gap: 8px; }
    .sib-dots .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--paper);
      border: 1.5px solid var(--rule);
      cursor: pointer; transition: all 140ms ease;
    }
    .sib-dots .dot:hover { border-color: var(--accent); }
    .sib-dots .dot.active { background: var(--accent); border-color: var(--accent); }
    .sib-dots .dot.winner { box-shadow: 0 0 0 3px var(--accent-soft); }
    .sib-dots .count {
      font-family: var(--mono); font-size: 11px; color: var(--ink-3);
      letter-spacing: 0.06em; margin-left: 4px;
    }
    .play-btn {
      background: transparent; border: 1px solid var(--rule);
      color: var(--ink); padding: 6px 12px; cursor: pointer;
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .play-btn:hover { background: var(--ink); color: var(--paper); }
    .play-btn.playing { background: var(--accent); color: #fff; border-color: var(--accent); }

    .stage-bar .spacer { flex: 1; }

    /* yes/no toggle (saliency overlay) */
    .toggle {
      display: inline-flex; align-items: center; gap: 12px;
      cursor: pointer; user-select: none;
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink-3);
    }
    .toggle .label-no, .toggle .label-yes {
      transition: color 140ms ease;
    }
    .toggle .switch {
      width: 40px; height: 22px; border-radius: 999px;
      background: var(--rule); position: relative;
      transition: background 180ms ease;
    }
    .toggle .switch::after {
      content: ""; position: absolute; top: 2px; left: 2px;
      width: 18px; height: 18px; border-radius: 50%; background: var(--paper);
      transition: transform 180ms cubic-bezier(.4,1.4,.5,1);
    }
    .toggle.on .switch { background: var(--accent); }
    .toggle.on .switch::after { transform: translateX(18px); }
    .toggle .label-no { color: var(--ink); }
    .toggle.on .label-no { color: var(--ink-3); }
    .toggle.on .label-yes { color: var(--ink); }
    .toggle:hover .switch { box-shadow: 0 0 0 4px var(--accent-soft); }

    /* slider */
    .scrubber-wrap {
      max-width: 1500px; margin: 16px auto 0; padding: 0 48px 32px;
    }
    .scrubber {
      position: relative; height: 96px;
      border-top: 1px solid var(--rule);
    }
    .scrubber .track {
      position: absolute; left: 0; right: 0; top: 28px;
      height: 1px; background: var(--rule); opacity: 0.18;
    }
    .scrubber .progress {
      position: absolute; left: 0; top: 28px;
      height: 1px; background: var(--accent); opacity: 0.7;
      transition: width 250ms ease;
    }
    .scrubber .tick {
      position: absolute; top: 16px; transform: translateX(-50%);
      cursor: pointer; user-select: none; width: 80px; text-align: center;
    }
    .scrubber .tick .dot {
      width: 12px; height: 12px; margin: 0 auto;
      border-radius: 50%; background: var(--paper);
      border: 1.5px solid var(--rule);
      transition: background 160ms, border-color 160ms, transform 160ms;
    }
    .scrubber .tick.active .dot {
      background: var(--accent); border-color: var(--accent);
      transform: scale(1.25);
    }
    .scrubber .tick.best .dot {
      border-color: var(--accent);
    }
    .scrubber .tick .lbl {
      margin-top: 8px; font-family: var(--mono); font-size: 11px;
      color: var(--ink-3); letter-spacing: 0.05em;
    }
    .scrubber .tick.active .lbl { color: var(--ink); }
    .scrubber .tick .val {
      margin-top: 2px; font-family: var(--serif); font-size: 14px;
      color: var(--ink-2);
    }
    .scrubber .tick.active .val { color: var(--ink); font-weight: 500; }
    .scrubber .helper {
      position: absolute; bottom: 0; left: 0; right: 0;
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink-3);
      display: flex; justify-content: space-between;
    }

    /* criterion strip */
    .criteria {
      max-width: 1500px; margin: 0 auto; padding: 8px 48px 24px;
      display: grid; gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    .crit {
      padding: 12px 0; border-top: 1px solid var(--rule);
    }
    .crit .k {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-3);
    }
    .crit .v {
      font-family: var(--serif); font-size: 28px; font-weight: 500;
      line-height: 1; margin-top: 6px; color: var(--ink);
    }
    .crit .src {
      font-family: var(--mono); font-size: 10px; color: var(--ink-3);
      margin-top: 4px;
    }
    .crit .d {
      font-family: var(--mono); font-size: 12px; margin-top: 4px;
    }
    .crit .why {
      margin-top: 8px;
      font-family: var(--serif); font-style: italic; font-size: 12.5px;
      line-height: 1.4; color: var(--ink-2);
    }

    /* siblings drawer (gen-0 fan-out) */
    .siblings {
      max-width: 1500px; margin: 0 auto; padding: 24px 48px 48px;
      border-top: 1px solid var(--rule);
    }
    .siblings h3 {
      margin: 0 0 16px; font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-3); font-weight: 500;
    }
    .sib-grid {
      display: grid; gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    }
    .sib {
      cursor: pointer; background: var(--paper);
      transition: transform 160ms ease;
    }
    .sib:hover { transform: translateY(-2px); }
    .sib .shot {
      aspect-ratio: 1280 / 800; background: #fff;
      border: 1px solid var(--rule); overflow: hidden;
    }
    .sib .shot img {
      width: 100%; height: 100%; object-fit: cover; object-position: top;
      filter: saturate(0.95);
    }
    .sib.winner .shot {
      border: 1.5px solid var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .sib .info {
      margin-top: 8px; display: flex; justify-content: space-between;
      align-items: baseline; font-family: var(--mono); font-size: 11px;
    }
    .sib .info .name { color: var(--ink-2); }
    .sib .info .score { color: var(--ink); font-weight: 600; }
    .sib.winner .info .name { color: var(--accent); }
    .sib.winner .info .name::after { content: " · winner"; font-style: italic; }

    /* ============================================================ */
    /* PAGE 2 — METRICS                                              */
    /* ============================================================ */
    .metrics-head { padding: 56px 48px 24px; max-width: 1500px; margin-inline: auto; }
    .metrics-grid {
      max-width: 1500px; margin-inline: auto; padding: 0 48px 48px;
      display: grid; gap: 48px; grid-template-columns: 1fr;
    }
    .chart-card {
      border-top: 1px solid var(--rule); padding-top: 20px;
    }
    .chart-card .head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 14px;
    }
    .chart-card h3 {
      margin: 0; font-family: var(--serif); font-weight: 500; font-size: 22px;
      letter-spacing: -0.005em;
    }
    .chart-card .head .now {
      font-family: var(--mono); font-size: 13px; color: var(--ink-3);
    }
    .chart-card .head .now strong { color: var(--ink); font-weight: 600; }
    .chart-card .head .now .d { margin-left: 8px; }
    .chart-card svg { width: 100%; display: block; }
    .chart-headline svg { height: 260px; }
    .chart-small  svg { height: 130px; }

    .small-multiples {
      display: grid; gap: 36px 48px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    /* VLM judge feedback */
    .vlm-section {
      max-width: 1500px; margin: 0 auto; padding: 32px 48px 80px;
      border-top: 1px solid var(--rule);
    }
    .vlm-section .head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 18px;
    }
    .vlm-section h3 {
      margin: 0; font-family: var(--serif); font-size: 24px; font-weight: 500;
    }
    .vlm-section .badge {
      font-family: var(--mono); font-size: 11px; padding: 3px 10px;
      border: 1px solid var(--ink-3); color: var(--ink-3); border-radius: 99px;
    }
    .vlm-list {
      display: grid; gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .vlm-card {
      padding: 18px; border: 1px solid var(--rule); background: var(--paper-2);
    }
    .vlm-card .gen {
      font-family: var(--mono); font-size: 11px; color: var(--ink-3);
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .vlm-card .feedback {
      font-family: var(--serif); font-size: 17px; font-style: italic;
      color: var(--ink-2); margin-top: 8px; line-height: 1.45;
    }
    .vlm-card .issues-label {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-3);
      margin-top: 16px; margin-bottom: 8px;
    }
    .vlm-issue {
      margin-top: 10px; padding-left: 12px;
      border-left: 2px solid var(--rule);
    }
    .vlm-issue.sev-high   { border-left-color: var(--accent); }
    .vlm-issue.sev-medium { border-left-color: var(--ink-3); }
    .vlm-issue .where {
      font-family: var(--mono); font-size: 11px; color: var(--ink);
    }
    .vlm-issue .sev {
      font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink-3); margin-left: 6px;
    }
    .vlm-issue.sev-high .sev { color: var(--accent); }
    .vlm-issue .problem {
      font-family: var(--serif); font-size: 14px; color: var(--ink-2);
      line-height: 1.4; margin-top: 3px;
    }
    .vlm-issue .fix {
      font-family: var(--serif); font-size: 14px; font-style: italic;
      color: var(--ink); line-height: 1.4; margin-top: 3px;
    }
    .vlm-issue .fix::before { content: "→ "; color: var(--accent); font-style: normal; }

    /* svg chart helpers */
    .axis-line { stroke: var(--rule); stroke-width: 1; opacity: 0.45; }
    .axis-line.faint { stroke-dasharray: 2 4; opacity: 0.18; }
    .axis-tick { font-family: var(--mono); font-size: 10px; fill: var(--ink-3); }
    .series-line { fill: none; stroke: var(--accent); stroke-width: 2; }
    .series-area { fill: var(--accent); opacity: 0.10; }
    .series-dot { fill: var(--accent); stroke: var(--paper); stroke-width: 1.5; }
    .series-dot.best { stroke: var(--accent); fill: var(--paper); stroke-width: 2.5; }
    .series-value { font-family: var(--mono); font-size: 11px; fill: var(--ink); font-weight: 500; }

    /* lightbox */
    .lightbox {
      position: fixed; inset: 0; z-index: 50; background: rgba(28,24,20,0.78);
      display: none; padding: 32px;
    }
    .lightbox.open { display: grid; grid-template-rows: auto 1fr; gap: 14px; }
    .lightbox .top {
      display: flex; justify-content: space-between; align-items: center;
      color: var(--paper); font-family: var(--serif); font-size: 18px; font-style: italic;
    }
    .lightbox .top button {
      background: var(--paper); color: var(--ink); border: 0; padding: 6px 14px;
      cursor: pointer; font-family: var(--mono); font-size: 12px;
    }
    .lightbox .body { display: grid; grid-template-columns: 1fr; gap: 14px; min-height: 0; }
    .lightbox iframe {
      width: 100%; height: 100%; background: white;
      border: 1px solid var(--rule);
    }

    /* ---- signal explainer sections (metrics page) ---------------------- */
    /* One per new criterion: a header + a plain-English "what it grades on"
       lead, then per-generation cards showing the evidence behind the score. */
    .signal-section {
      max-width: 1500px; margin: 0 auto; padding: 36px 48px 8px;
      border-top: 1px solid var(--rule);
    }
    .signal-section .head {
      display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;
    }
    .signal-section h3 { margin: 0; font-family: var(--serif); font-size: 24px; font-weight: 500; }
    .signal-section .badge {
      font-family: var(--mono); font-size: 11px; padding: 3px 10px;
      border: 1px solid var(--ink-3); color: var(--ink-3); border-radius: 99px;
    }
    .signal-section .badge.live { border-color: var(--accent); color: var(--accent); }
    .signal-lead {
      font-family: var(--serif); font-size: 17px; font-style: italic;
      color: var(--ink-2); margin: 0 0 8px; max-width: 72ch; line-height: 1.45;
    }
    .signal-grades {
      font-family: var(--mono); font-size: 11px; color: var(--ink-3);
      letter-spacing: 0.03em; margin: 0 0 22px; max-width: 78ch; line-height: 1.55;
    }
    .signal-grades b { color: var(--ink-2); font-weight: 600; }

    .gen-cards { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); }
    .gen-card { padding: 18px; border: 1px solid var(--rule); background: var(--paper-2); }
    .gen-card .gen-top {
      display: flex; justify-content: space-between; align-items: baseline;
      border-bottom: 1px solid var(--rule); padding-bottom: 8px; margin-bottom: 12px;
    }
    .gen-card .gen-top .g {
      font-family: var(--mono); font-size: 11px; color: var(--ink-3);
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .gen-card .gen-top .score {
      font-family: var(--serif); font-size: 24px; font-weight: 500; color: var(--ink); line-height: 1;
    }
    .gen-card .gen-top .score sup { font-size: 11px; color: var(--ink-3); font-weight: 400; margin-left: 2px; }
    .empty-inline {
      font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--ink-3); padding: 4px 0;
    }

    /* requirement checklist (prompt consistency) */
    .req-group-label {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-3); margin: 14px 0 6px;
    }
    .req-group-label:first-of-type { margin-top: 2px; }
    .reqs { display: grid; gap: 6px; }
    .req { display: flex; gap: 9px; align-items: baseline; font-size: 13.5px; line-height: 1.4; }
    .req .mark { font-family: var(--mono); font-size: 12px; flex: none; width: 13px; text-align: center; }
    .req.met    { color: var(--ink-2); } .req.met .mark    { color: var(--good); }
    .req.miss   { color: var(--ink);   } .req.miss .mark   { color: var(--bad); font-weight: 600; }
    .req.contra { color: var(--ink);   } .req.contra .mark { color: var(--accent); font-weight: 600; }
    .rationale {
      font-family: var(--serif); font-style: italic; font-size: 14px;
      color: var(--ink-2); margin-top: 14px; line-height: 1.45;
    }

    /* summary stat chips (stress test) */
    .stat-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 12px; }
    .stat-chip {
      font-family: var(--mono); font-size: 11px; padding: 4px 9px;
      border: 1px solid var(--rule); color: var(--ink-2); background: var(--paper);
    }
    .stat-chip strong { color: var(--ink); }
    .stat-chip.warn { border-color: var(--accent); color: var(--accent); }
    .stat-chip.warn strong { color: var(--accent); }
    .note-block { font-family: var(--serif); font-size: 14px; color: var(--ink-2); line-height: 1.45; margin-top: 12px; }
    .note-block .lbl {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink-3); display: block; margin-bottom: 3px;
    }

    /* severity-tagged issue (shared by stress test) */
    .sig-issue { margin-top: 8px; padding-left: 12px; border-left: 2px solid var(--rule); }
    .sig-issue.sev-critical { border-left-color: var(--bad); }
    .sig-issue.sev-high     { border-left-color: var(--accent); }
    .sig-issue.sev-medium   { border-left-color: var(--ink-3); }
    .sig-issue.sev-low      { border-left-color: var(--ink-3); opacity: 0.85; }
    .sig-issue .sev {
      font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink-3); margin-right: 7px;
    }
    .sig-issue.sev-critical .sev { color: var(--bad); }
    .sig-issue.sev-high .sev { color: var(--accent); }
    .sig-issue .desc { font-family: var(--serif); font-size: 14px; color: var(--ink-2); line-height: 1.4; }

    /* persona row (stress test subagent mode) */
    .persona { margin-top: 10px; padding-left: 12px; border-left: 2px solid var(--rule); }
    .persona.ok   { border-left-color: var(--good); }
    .persona.fail { border-left-color: var(--bad); }
    .persona .pname { font-family: var(--mono); font-size: 11px; color: var(--ink); }
    .persona .pgoal-met {
      font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em;
      text-transform: uppercase; margin-left: 8px;
    }
    .persona.ok .pgoal-met   { color: var(--good); }
    .persona.fail .pgoal-met { color: var(--bad); }
    .persona .psum {
      font-family: var(--serif); font-size: 13.5px; font-style: italic;
      color: var(--ink-2); margin-top: 2px; line-height: 1.4;
    }

    /* brain / design classifier: P(good) bar + feature legend */
    .pgood-bar {
      height: 24px; background: var(--paper); border: 1px solid var(--rule);
      position: relative; overflow: hidden;
    }
    .pgood-bar .fill { position: absolute; top: 0; bottom: 0; left: 0; background: var(--accent); opacity: 0.78; transition: width 300ms ease; }
    .pgood-bar .mid  { position: absolute; top: 0; bottom: 0; left: 50%; width: 1px; background: var(--rule); opacity: 0.6; }
    .pgood-bar .txt  {
      position: absolute; inset: 0; display: flex; align-items: center; padding-left: 10px;
      font-family: var(--mono); font-size: 11px; color: var(--ink);
    }
    .feature-grid {
      display: grid; gap: 5px 20px; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      margin: 0 0 4px; padding: 16px 18px; border: 1px solid var(--rule); background: var(--paper-2);
    }
    .feature-grid .f {
      font-family: var(--mono); font-size: 11px; color: var(--ink-2);
      display: flex; justify-content: space-between; gap: 12px;
      border-bottom: 1px dotted var(--ink-3); padding: 3px 0;
    }
    .feature-grid .f .fk { color: var(--ink-3); text-align: right; }
    .backend-note {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em;
      color: var(--ink-3); margin-top: 8px;
    }
    .backend-note.fallback { color: var(--accent); }
  </style>
</head>
<body>

<header class="masthead">
  <div class="wordmark">autodesign<em>.</em></div>
  <nav class="nav">
    <button data-view="evolution" class="active">Evolution</button>
    <button data-view="metrics">Metrics</button>
  </nav>
  <div class="meta">
    <select id="run-picker"></select>
    <span class="stat" id="meta-stat"></span>
  </div>
</header>

<main id="main">
  <p class="empty">Loading…</p>
</main>

<div class="lightbox" id="lightbox">
  <div class="top">
    <span id="lightbox-title"></span>
    <button id="lightbox-close">close (esc)</button>
  </div>
  <div class="body">
    <iframe id="lightbox-iframe" sandbox="allow-same-origin allow-scripts"></iframe>
  </div>
</div>

<script>
// ============================================================
// state
// ============================================================
const STATE = {
  runs: [],
  runId: null,
  manifest: null,
  view: "evolution",        // "evolution" | "metrics"
  scrubIndex: 0,            // index into generations
  candIndex: 0,             // which sibling within current gen is on stage
  showSaliency: false,      // overlay on the stage
  playTimer: null,          // interval id for auto-cycle through siblings
  stageA: null,             // ping-pong base image layers (stable across flips)
  stageB: null,
  stageSal: null,           // saliency layer
  stageFrame: null,         // live iframe layer showing the candidate's actual HTML
  stageRO: null,            // ResizeObserver to keep the iframe scale matched to the stage box
  stageActive: "a",         // which base layer is currently visible
};

const SUB_LABELS = {
  intent_alignment:   "intent alignment",
  focus_clarity:      "focus clarity",
  reading_order:      "reading order",
  animation_focus:    "animation focus",
  // new top-level criteria (each is also explained in its own metrics section)
  prompt_consistency: "brief adherence",
  stress_test:        "interaction QA",
  brain_judge:        "design classifier",
  // legacy keys (left in so historical runs still pretty-print)
  hero_pull:          "hero pull",
  focal_dominance:    "focal dominance",
  composition_spread: "spread",
  scan_rhythm:        "scan rhythm",
};

// ============================================================
// utils
// ============================================================
async function jget(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url} ${r.status}`);
  return r.json();
}
function el(tag, attrs, ...kids) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "class") e.className = v;
      else if (k === "on") for (const [ev, fn] of Object.entries(v)) e.addEventListener(ev, fn);
      else if (k === "html") e.innerHTML = v;
      else if (v != null) e.setAttribute(k, v);
    }
  }
  for (const k of kids) {
    if (k == null || k === false) continue;
    e.append(typeof k === "string" || typeof k === "number" ? String(k) : k);
  }
  return e;
}
function svgNode(tag, attrs) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (v != null) e.setAttribute(k, v);
  }
  return e;
}
function fmt(x, d = 2) {
  if (x == null) return "—";
  if (typeof x !== "number") return String(x);
  return x.toFixed(d);
}
function prettyKey(k) { return SUB_LABELS[k] || k.replace(/_/g, " "); }

function bestIndex(gens) {
  let bi = 0, bv = -Infinity;
  gens.forEach((g, i) => {
    const c = winnerOf(g);
    const v = c?.combined ?? -Infinity;
    if (v > bv) { bv = v; bi = i; }
  });
  return bi;
}
function winnerOf(gen) {
  return gen.candidates.find(c => c.id === gen.winner) || gen.candidates[0];
}

/** Per-generation series for a given criterion key (winner only). */
function seriesFor(gens, key) {
  return gens.map(g => {
    const w = winnerOf(g);
    const c = (w?.criteria || []).find(x => x.key === key);
    return c?.score ?? null;
  });
}
/** Per-generation series for the combined (engine-level) score. */
function combinedSeries(gens) {
  return gens.map(g => winnerOf(g)?.combined ?? null);
}

/** Union of criterion keys present across all winners. Ordered by first appearance. */
function criterionKeys(gens) {
  const seen = new Set();
  const order = [];
  for (const g of gens) {
    for (const c of (winnerOf(g)?.criteria || [])) {
      if (!seen.has(c.key)) { seen.add(c.key); order.push(c.key); }
    }
  }
  return order;
}

// ============================================================
// rendering — evolution page
// ============================================================
function renderEvolution() {
  stopPlay();
  const m = STATE.manifest;
  const gens = m.generations;
  if (!gens.length) {
    document.getElementById("main").innerHTML = `<p class="empty">No generations yet.</p>`;
    return;
  }
  const main = document.getElementById("main");
  main.innerHTML = "";

  const gen = gens[STATE.scrubIndex];
  // Clamp candIndex into this gen's candidate list.
  if (STATE.candIndex >= gen.candidates.length) STATE.candIndex = 0;

  // hero: info column + stage shell column
  const info = el("div", { class: "evo-info", id: "evo-info" });
  const stageShell = el("div", { class: "stage-shell" }, buildStageShell(gen));
  main.appendChild(el("section", { class: "evo-hero" }, info, stageShell));
  paintInfo(gen);

  // scrubber
  main.appendChild(renderScrubber(gens));

  // criterion strip — reflects the candidate currently on stage
  main.appendChild(el("div", { class: "criteria", id: "criteria-strip" }));
  paintCriteria(gen);
}

/* Build the stage shell ONCE per generation: two stable base img layers,
   one saliency layer, prev/next arrows, badge, open-live button, and a
   bar with sibling dots + saliency toggle + auto-play. After this, all
   updates (flip, toggle, play) mutate the existing DOM so transitions animate. */
function buildStageShell(gen) {
  const stage = el("div", { class: "stage" });
  // Live iframe layer — the candidate's actual HTML, so its entrance
  // animation runs on every flip. The page is authored for 1280x800; we
  // CSS-scale the iframe down so it fits whatever size the stage box ends up.
  STATE.stageFrame = el("iframe", {
    class: "layer frame-layer",
    sandbox: "allow-same-origin allow-scripts",
    loading: "eager",
    title: "candidate preview",
  });
  STATE.stageSal = el("img", { class: "layer saliency-layer", alt: "saliency overlay" });
  STATE.stageActive = "a";
  stage.appendChild(STATE.stageFrame);
  stage.appendChild(STATE.stageSal);

  // Keep the iframe scaled so 1280px-wide pages fill the stage box exactly.
  // ResizeObserver fires whenever the stage box is resized (layout / window).
  if (STATE.stageRO) { STATE.stageRO.disconnect(); }
  STATE.stageRO = new ResizeObserver(entries => {
    for (const e of entries) {
      const w = e.contentRect.width;
      if (w > 0) STATE.stageFrame.style.transform = `scale(${w / 1280})`;
    }
  });
  STATE.stageRO.observe(stage);

  const badge = el("div", { class: "stage-badge", id: "stage-badge" });
  stage.appendChild(badge);

  const prev = el("button", { class: "nav-arrow prev", title: "previous sibling" }, "‹");
  prev.addEventListener("click", e => { e.stopPropagation(); stepCand(-1); });
  const next = el("button", { class: "nav-arrow next", title: "next sibling" }, "›");
  next.addEventListener("click", e => { e.stopPropagation(); stepCand(1); });
  if (gen.candidates.length <= 1) {
    prev.setAttribute("disabled", "");
    next.setAttribute("disabled", "");
  }
  stage.appendChild(prev);
  stage.appendChild(next);

  const openLive = el("button", { class: "open-live", title: "open live page + saliency" }, "open ↗");
  openLive.addEventListener("click", e => { e.stopPropagation(); openLightbox(currentCand()); });
  stage.appendChild(openLive);

  const empty = el("div", { class: "empty-layer", id: "stage-empty", style: "display:none" }, "no frame captured");
  stage.appendChild(empty);

  // bar under the stage
  const bar = el("div", { class: "stage-bar" });

  // sibling dots
  const dots = el("div", { class: "sib-dots", id: "sib-dots" });
  gen.candidates.forEach((c, i) => {
    const d = el("div", {
      class: `dot ${i === STATE.candIndex ? "active" : ""} ${c.id === gen.winner ? "winner" : ""}`,
      title: c.id + (c.id === gen.winner ? " · winner" : "")
    });
    d.addEventListener("click", () => setCand(i));
    dots.appendChild(d);
  });
  dots.appendChild(el("span", { class: "count", id: "sib-count" }));
  bar.appendChild(dots);

  // auto-play (only meaningful with siblings)
  if (gen.candidates.length > 1) {
    const play = el("button", { class: "play-btn", id: "play-btn" }, "▶ play");
    play.addEventListener("click", togglePlay);
    bar.appendChild(play);
  }

  bar.appendChild(el("div", { class: "spacer" }));

  // saliency yes/no toggle
  if (gen.candidates.some(c => c.saliency)) {
    const toggle = el("div", { class: `toggle ${STATE.showSaliency ? "on" : ""}`, id: "saliency-toggle", title: "show DeepGaze saliency heatmap" },
      el("span", null, "saliency"),
      el("span", { class: "label-no" }, "no"),
      el("div", { class: "switch" }),
      el("span", { class: "label-yes" }, "yes"),
    );
    toggle.addEventListener("click", () => setShowSaliency(!STATE.showSaliency));
    bar.appendChild(toggle);
  }

  // initial paint
  setTimeout(() => paintStage(gen, /*animate=*/false), 0);

  return el("div", null, stage, bar);
}

/* Mutate the existing stage to show candidate at STATE.candIndex. */
function paintStage(gen, animate = true) {
  const cand = gen.candidates[STATE.candIndex];
  if (!cand) return;
  const emptyEl = document.getElementById("stage-empty");
  const haveHtml = !!cand.html;
  emptyEl.style.display = haveHtml ? "none" : "grid";

  // Live iframe layer. Setting src on every flip restarts the page's
  // entrance animation — exactly what we want users to see. When the
  // saliency overlay is on we keep the iframe in place (animations still
  // running underneath) but the heatmap covers it.
  const frame = STATE.stageFrame;
  if (haveHtml) {
    // Force a reload even when flipping to the same src (e.g. user nudges
    // to the same candidate) so the animation always restarts cleanly.
    frame.src = "about:blank";
    requestAnimationFrame(() => { frame.src = cand.html; });
    frame.classList.add("active");
  } else {
    frame.classList.remove("active");
    frame.src = "about:blank";
  }
  if (!animate) {
    frame.style.transition = "none";
    requestAnimationFrame(() => { frame.style.transition = ""; });
  }

  // Saliency overlay layer — toggled by the YES/NO control under the stage.
  if (cand.saliency) {
    STATE.stageSal.src = cand.saliency;
    STATE.stageSal.classList.toggle("active", !!STATE.showSaliency);
  } else {
    STATE.stageSal.classList.remove("active");
    STATE.stageSal.removeAttribute("src");
  }

  // badge: "cand-XX · winner" / "cand-XX"
  const badge = document.getElementById("stage-badge");
  if (badge) {
    badge.innerHTML = "";
    badge.append(cand.id);
    if (cand.id === gen.winner) {
      badge.appendChild(el("span", { class: "star" }, "  ★ winner"));
    }
  }

  // sibling indicator dots + count
  const dotsRoot = document.getElementById("sib-dots");
  if (dotsRoot) {
    const dots = dotsRoot.querySelectorAll(".dot");
    dots.forEach((d, i) => d.classList.toggle("active", i === STATE.candIndex));
    const count = document.getElementById("sib-count");
    if (count) count.textContent = `${STATE.candIndex + 1} of ${gen.candidates.length}`;
  }
}

/* Repaint the info column (gen score, hypothesis, what-changed). Cheap full redraw. */
function paintInfo(gen) {
  const m = STATE.manifest;
  const prevGen = STATE.scrubIndex > 0 ? STATE.manifest.generations[STATE.scrubIndex - 1] : null;
  const cand = currentCand();
  const winner = winnerOf(gen);
  const prevWinner = prevGen ? winnerOf(prevGen) : null;
  const isMulti = gen.candidates.length > 1;

  // For fan-out gens we show TWO numbers: the candidate on stage, and (smaller) the gen winner.
  const showScore = cand?.combined;
  const winnerScore = winner?.combined;
  const delta = (showScore != null && prevWinner?.combined != null) ? showScore - prevWinner.combined : null;

  const info = document.getElementById("evo-info");
  info.innerHTML = "";
  info.appendChild(el("h1", { class: "display" }, "AutoDesign."));
  info.appendChild(el("p", { class: "body-lead" }, "relentlessly refined."));
  info.appendChild(el("div", { class: "gen-label", style: "margin-top:40px" }, gen.id.toUpperCase() + (isMulti ? ` · ${cand?.id ?? ""}` : "")));
  info.appendChild(el("div", { class: "gen-score" },
    showScore != null ? showScore.toFixed(2) : "—",
    el("sup", null, "/ 10"),
  ));
  if (isMulti && cand?.id !== gen.winner && winnerScore != null) {
    info.appendChild(el("div", { class: "delta flat" }, `winner of this gen: ${winnerScore.toFixed(2)} (${gen.winner})`));
  } else {
    info.appendChild(el("div", { class: `delta ${deltaClass(delta)}` },
      isMulti ? "click dots to flip · play to auto-cycle" : deltaText(delta)));
  }
  if (cand?.hypothesis) {
    info.appendChild(el("p", { class: "gen-headline" }, "“" + cand.hypothesis.replace(/^hypothesis:\s*/i, "") + "”"));
  }
}

/* Repaint the criterion strip for the candidate currently on stage. */
function paintCriteria(gen) {
  const prevGen = STATE.scrubIndex > 0 ? STATE.manifest.generations[STATE.scrubIndex - 1] : null;
  const prevCand = prevGen ? winnerOf(prevGen) : null;
  const cand = currentCand();
  const host = document.getElementById("criteria-strip");
  if (!host) return;
  host.innerHTML = "";
  if (!cand || !cand.criteria || cand.criteria.length === 0) return;
  const prevByKey = Object.fromEntries((prevCand?.criteria || []).map(c => [c.key, c.score]));
  for (const c of cand.criteria) {
    const prev = prevByKey[c.key];
    const d = (c.score != null && prev != null) ? c.score - prev : null;
    const dtxt = d == null ? "" : (Math.abs(d) < 0.005 ? "±.00" : (d > 0 ? `+${d.toFixed(2)}` : d.toFixed(2)));
    const dcls = d == null ? "flat" : (Math.abs(d) < 0.005 ? "flat" : (d > 0 ? "pos" : "neg"));
    // Plain-English explanation from the signal, if it provided one.
    const why = explanationFor(cand, c);
    host.appendChild(el("div", { class: "crit" },
      el("div", { class: "k" }, prettyKey(c.key)),
      el("div", { class: "v" }, c.score != null ? c.score.toFixed(2) : "—"),
      el("div", { class: `d delta ${dcls}` }, dtxt),
      el("div", { class: "src" }, c.source && c.source !== c.key ? "from " + c.source : ""),
      why ? el("div", { class: "why" }, why) : null,
    ));
  }
}

/* Read a per-subscore explanation from the candidate's raw signal details.
   Returns null if the signal didn't emit one (e.g. legacy runs). */
function explanationFor(cand, c) {
  const det = cand?.details?.[c.source]?.details;
  if (!det) return null;
  const ex = det.explanations;
  if (ex && typeof ex[c.key] === "string") return ex[c.key];
  // VLM judge: the per-principle `reason` is its plain-English explanation.
  const pp = det.per_principle;
  if (pp && pp[c.key] && typeof pp[c.key].reason === "string") return pp[c.key].reason;
  // Nemotron signals carry their own narrative fields.
  if (c.source === "stress_test") {
    if (det.consistency_notes || det.function_notes) return det.consistency_notes || det.function_notes;
    const i0 = det.issues && det.issues[0];
    if (i0) return typeof i0 === "string" ? i0 : (i0.description || null);  // issues may be strings OR {severity, description}
    return null;
  }
  if (c.source === "prompt_consistency")
    return det.rationale || (det.missing && det.missing.length ? "Missing: " + det.missing[0] : null);
  if (c.source === "brain_judge") {
    const p = det.p_good;
    if (typeof p === "number")
      return `Looks ${(p * 100).toFixed(0)}% like an award-winning site vs AI slop — perceptual classifier, not real brain data.`;
    return det.interpretation || null;
  }
  return null;
}

// --- helpers shared by the per-signal metrics sections -----------------
/** A signal's free-form `details` object for a candidate, or null. */
function signalDet(cand, key) { return cand?.details?.[key]?.details || null; }
/** True if ANY candidate in the run carries details for this signal. */
function signalActiveAnywhere(gens, key) {
  return gens.some(g => g.candidates.some(c => signalDet(c, key)));
}
/** A criterion's score on the 0–10 scale (per_criterion is 0–10; flat criteria are 0–1). */
function critScore10(cand, key) {
  if (cand?.per_criterion && typeof cand.per_criterion[key] === "number") return cand.per_criterion[key];
  const c = (cand?.criteria || []).find(x => x.key === key);
  return (c && typeof c.score === "number") ? c.score * 10 : null;
}
/** A `<span class="score">N.NN /10</span>` node (or em-dash when missing). */
function scoreSpan(v) {
  const s = el("span", { class: "score" });
  if (v == null) { s.append("—"); } else { s.append(v.toFixed(2)); s.appendChild(el("sup", null, "/10")); }
  return s;
}

/* Current candidate on the stage. */
function currentCand() {
  const gen = STATE.manifest.generations[STATE.scrubIndex];
  return gen.candidates[STATE.candIndex];
}

/* Flip to a specific sibling by index (clamped). Animates the crossfade. */
function setCand(i) {
  const gen = STATE.manifest.generations[STATE.scrubIndex];
  const n = gen.candidates.length;
  STATE.candIndex = ((i % n) + n) % n;
  paintStage(gen, /*animate=*/true);
  paintInfo(gen);
  paintCriteria(gen);
}
function stepCand(d) { setCand(STATE.candIndex + d); }

/* Saliency yes/no. */
function setShowSaliency(v) {
  STATE.showSaliency = !!v;
  const t = document.getElementById("saliency-toggle");
  if (t) t.classList.toggle("on", STATE.showSaliency);
  const gen = STATE.manifest.generations[STATE.scrubIndex];
  paintStage(gen, /*animate=*/false);
}

/* Auto-cycle through siblings. */
function togglePlay() {
  if (STATE.playTimer) { stopPlay(); return; }
  const btn = document.getElementById("play-btn");
  if (btn) { btn.classList.add("playing"); btn.textContent = "■ stop"; }
  STATE.playTimer = setInterval(() => stepCand(1), 1400);
}
function stopPlay() {
  if (STATE.playTimer) { clearInterval(STATE.playTimer); STATE.playTimer = null; }
  const btn = document.getElementById("play-btn");
  if (btn) { btn.classList.remove("playing"); btn.textContent = "▶ play"; }
}

function deltaText(d) {
  if (d == null) return "first generation";
  if (Math.abs(d) < 0.005) return "±0.00 vs prev winner";
  const sign = d > 0 ? "+" : "";
  return `${sign}${d.toFixed(2)} vs prev winner`;
}
function deltaClass(d) {
  if (d == null) return "flat";
  if (Math.abs(d) < 0.005) return "flat";
  return d > 0 ? "pos" : "neg";
}

function renderChangedNote(manifest, gen) {
  const linRec = (manifest.lineage || []).find(r => `gen-${String(r.generation).padStart(3, "0")}` === gen.id);
  if (!linRec) return null;
  const changed = linRec.changed;
  if (!changed) return null;
  return el("p", { class: "gen-changed" },
    el("strong", null, "what changed: "),
    changed,
  );
}

function renderScrubber(gens) {
  const combined = combinedSeries(gens);
  const best = bestIndex(gens);
  const n = gens.length;
  const wrap = el("div", { class: "scrubber-wrap" });
  const sc = el("div", { class: "scrubber" });
  sc.appendChild(el("div", { class: "track" }));

  // ticks
  const pct = i => n === 1 ? 50 : (i / (n - 1)) * 100;
  const progress = el("div", { class: "progress", style: `width:${pct(STATE.scrubIndex)}%` });
  sc.appendChild(progress);

  gens.forEach((g, i) => {
    const v = combined[i];
    const tick = el("div", {
      class: `tick ${i === STATE.scrubIndex ? "active" : ""} ${i === best ? "best" : ""}`,
      style: `left:${pct(i)}%`,
      on: { click: () => {
        STATE.scrubIndex = i;
        // Reset candidate to the winner of the new gen, drop saliency overlay, stop autoplay.
        const newGen = STATE.manifest.generations[i];
        STATE.candIndex = Math.max(0, newGen.candidates.findIndex(c => c.id === newGen.winner));
        STATE.showSaliency = false;
        renderEvolution();
      } },
    },
      el("div", { class: "dot" }),
      el("div", { class: "lbl" }, g.id.replace(/^gen-0*/, "gen ")),
      el("div", { class: "val" }, v != null ? v.toFixed(2) : "—"),
    );
    sc.appendChild(tick);
  });

  sc.appendChild(el("div", { class: "helper" },
    el("span", null, "first impression"),
    el("span", null, "click any gen to scrub"),
    el("span", null, "polished")));

  wrap.appendChild(sc);
  return wrap;
}

function renderCriterionStrip(gen, prevWinner) {
  const w = winnerOf(gen);
  const wrap = el("div", { class: "criteria" });
  if (!w || !w.criteria || w.criteria.length === 0) return wrap;
  const prevByKey = Object.fromEntries((prevWinner?.criteria || []).map(c => [c.key, c.score]));
  for (const c of w.criteria) {
    const prev = prevByKey[c.key];
    const d = (c.score != null && prev != null) ? c.score - prev : null;
    const dtxt = d == null ? "" : (Math.abs(d) < 0.005 ? "±.00" : (d > 0 ? `+${d.toFixed(2)}` : d.toFixed(2)));
    const dcls = d == null ? "flat" : (Math.abs(d) < 0.005 ? "flat" : (d > 0 ? "pos" : "neg"));
    wrap.appendChild(el("div", { class: "crit" },
      el("div", { class: "k" }, prettyKey(c.key)),
      el("div", { class: "v" }, c.score != null ? c.score.toFixed(2) : "—"),
      el("div", { class: `d delta ${dcls}` }, dtxt),
      el("div", { class: "src" }, c.source && c.source !== c.key ? "from " + c.source : ""),
    ));
  }
  return wrap;
}

// (siblings drawer removed — inline dots + arrows + auto-play on the stage handle this now.)

// ============================================================
// rendering — metrics page
// ============================================================
function renderMetrics() {
  const m = STATE.manifest;
  const gens = m.generations;
  const main = document.getElementById("main");
  main.innerHTML = "";

  main.appendChild(el("section", { class: "metrics-head" },
    el("div", { class: "eyebrow" }, m.brief || "AutoDesign run"),
    el("h1", { class: "display" }, "the loop, in numbers."),
    el("p", { class: "body-lead" },
      "Every criterion plotted across generations. Sub-scores are 0–1; combined is 0–10. A green dot marks the best generation."),
  ));

  // ---- combined chart (big)
  const combined = combinedSeries(gens);
  const cur = combined[combined.length - 1];
  const prev = combined.length > 1 ? combined[combined.length - 2] : null;
  const d = (cur != null && prev != null) ? cur - prev : null;
  const headlineCard = el("div", { class: "chart-card chart-headline" },
    el("div", { class: "head" },
      el("h3", null, "Combined score · 0–10"),
      el("div", { class: "now" },
        el("strong", null, fmt(cur, 2)),
        el("span", { class: `d delta ${deltaClass(d)}` }, " " + deltaText(d)),
      ),
    ),
    chartSVG(gens.map(g => g.id), combined, { maxY: 10, height: 260, fullLabels: true, markBest: true }),
  );

  // ---- small multiples
  const keys = criterionKeys(gens);
  const smallMultiples = el("div", { class: "small-multiples" });
  for (const k of keys) {
    const s = seriesFor(gens, k);
    const c = s[s.length - 1];
    const p = s.length > 1 ? s[s.length - 2] : null;
    const dd = (c != null && p != null) ? c - p : null;
    smallMultiples.appendChild(el("div", { class: "chart-card chart-small" },
      el("div", { class: "head" },
        el("h3", null, prettyKey(k)),
        el("div", { class: "now" },
          el("strong", null, fmt(c, 2)),
          el("span", { class: `d delta ${deltaClass(dd)}` }, dd == null ? "" : ` ${dd>0?"+":""}${dd.toFixed(2)}`),
        ),
      ),
      chartSVG(gens.map(g => g.id), s, { maxY: 1, height: 130, fullLabels: false, markBest: false }),
    ));
  }

  main.appendChild(el("section", { class: "metrics-grid" },
    headlineCard,
    el("div", { class: "chart-card" },
      el("div", { class: "head" }, el("h3", null, "Per-criterion evolution")),
      smallMultiples,
    ),
  ));

  // ---- per-signal explainer sections: what each criterion grades & why
  main.appendChild(renderVlmSection(gens));
  const pc = renderPromptConsistencySection(gens); if (pc) main.appendChild(pc);
  const st = renderStressTestSection(gens); if (st) main.appendChild(st);
  main.appendChild(renderBrainJudgeSection(gens));  // always shown — explains what it grades on
}

function chartSVG(labels, values, opts) {
  const { maxY = 10, height = 200, fullLabels = false, markBest = false } = opts || {};
  const w = 1400;
  const pad = { l: 44, r: 24, t: 18, b: 32 };
  const xs = labels.map((_, i) => pad.l + (i * (w - pad.l - pad.r)) / Math.max(labels.length - 1, 1));
  const ys = values.map(v => pad.t + (height - pad.t - pad.b) * (1 - ((v ?? 0) / maxY)));
  const svg = svgNode("svg", { viewBox: `0 0 ${w} ${height}`, preserveAspectRatio: "none" });

  // y grid
  const ticks = maxY === 1 ? [0, 0.25, 0.5, 0.75, 1] : [0, 2, 4, 6, 8, 10];
  for (const t of ticks) {
    const y = pad.t + (height - pad.t - pad.b) * (1 - t / maxY);
    svg.appendChild(svgNode("line", {
      x1: pad.l, x2: w - pad.r, y1: y, y2: y,
      class: t === 0 ? "axis-line" : "axis-line faint",
    }));
    const lbl = svgNode("text", {
      x: pad.l - 8, y: y + 4, "text-anchor": "end", class: "axis-tick",
    });
    lbl.textContent = maxY === 1 ? t.toFixed(2) : String(t);
    svg.appendChild(lbl);
  }

  // area + line
  if (values.some(v => v != null)) {
    const pts = xs.map((x, i) => `${x},${ys[i]}`).join(" ");
    const area = svgNode("polygon", {
      points: `${xs[0]},${height - pad.b} ${pts} ${xs[xs.length - 1]},${height - pad.b}`,
      class: "series-area",
    });
    svg.appendChild(area);
    const line = svgNode("polyline", { points: pts, class: "series-line" });
    svg.appendChild(line);
  }

  // best index (for combined chart marker)
  let best = -1, bv = -Infinity;
  if (markBest) values.forEach((v, i) => { if (v != null && v > bv) { bv = v; best = i; } });

  // dots
  values.forEach((v, i) => {
    if (v == null) return;
    svg.appendChild(svgNode("circle", {
      cx: xs[i], cy: ys[i], r: i === best ? 6 : 4,
      class: `series-dot ${i === best ? "best" : ""}`,
    }));
    if (fullLabels) {
      const lbl = svgNode("text", { x: xs[i], y: ys[i] - 12, "text-anchor": "middle", class: "series-value" });
      lbl.textContent = v.toFixed(2);
      svg.appendChild(lbl);
    }
  });

  // x labels
  labels.forEach((lab, i) => {
    const t = svgNode("text", { x: xs[i], y: height - 10, "text-anchor": "middle", class: "axis-tick" });
    t.textContent = lab.replace(/^gen-0*/, "gen ");
    svg.appendChild(t);
  });

  return svg;
}

function renderVlmSection(gens) {
  // Read the VLM judge's own output (critique + pinpointed issues) for a winner.
  // It lives under raw.vlm_judge.details, NOT the candidate-level critique
  // (which the loop reserves for the critic agent).
  const vlmOf = w => w?.details?.vlm_judge?.details || null;
  const anyJudged = gens.some(g => vlmOf(winnerOf(g)));

  const wrap = el("section", { class: "vlm-section" },
    el("div", { class: "head" },
      el("h3", null, "VLM judge"),
      el("span", { class: "badge" }, anyJudged ? "per-generation feedback" : "not yet run"),
    ),
    el("p", { class: "body-lead", style: "margin-top:0" },
      anyJudged
        ? "Each generation’s winner, as the vision judge saw it: its two-sentence verdict and the specific, located issues the next round should fix (worst first)."
        : "When the VLM judge signal runs, each generation’s winner will get a verdict here alongside its pinpointed issues."),
  );
  const list = el("div", { class: "vlm-list" });
  for (const g of gens) {
    const w = winnerOf(g);
    const vlm = vlmOf(w);
    const card = el("div", { class: "vlm-card" }, el("div", { class: "gen" }, g.id));

    if (!vlm) {
      card.appendChild(el("div", { class: "feedback" },
        w?.combined != null ? `awaiting judge — placed at ${w.combined.toFixed(2)} / 10` : "awaiting judge"));
      list.appendChild(card);
      continue;
    }

    if (vlm.critique) card.appendChild(el("div", { class: "feedback" }, "“" + vlm.critique + "”"));

    const issues = Array.isArray(vlm.issues) ? vlm.issues : [];
    if (issues.length) {
      card.appendChild(el("div", { class: "issues-label" }, `${issues.length} issue${issues.length > 1 ? "s" : ""} to fix`));
      for (const it of issues) {
        const sev = (it.severity || "medium").toLowerCase();
        const issueEl = el("div", { class: `vlm-issue sev-${sev}` });
        issueEl.appendChild(el("div", { class: "where" },
          it.where || "(unspecified)",
          el("span", { class: "sev" }, sev),
        ));
        if (it.problem) issueEl.appendChild(el("div", { class: "problem" }, it.problem));
        if (it.fix) issueEl.appendChild(el("div", { class: "fix" }, it.fix));
        card.appendChild(issueEl);
      }
    } else if (vlm.critique) {
      card.appendChild(el("div", { class: "issues-label" }, "no issues flagged"));
    }
    list.appendChild(card);
  }
  wrap.appendChild(list);
  return wrap;
}

// ------------------------------------------------------------
// per-signal explainer sections (one per newer criterion)
// Each answers two questions for the user: WHAT is this criterion
// grading, and WHY did each generation get the score it got.
// ------------------------------------------------------------

/* prompt_consistency — Nemotron text check of the build vs the brief. */
function renderPromptConsistencySection(gens) {
  if (!signalActiveAnywhere(gens, "prompt_consistency")) return null;
  const wrap = el("section", { class: "signal-section" },
    el("div", { class: "head" },
      el("h3", null, "Brief adherence"),
      el("span", { class: "badge live" }, "Nemotron · text check")),
    el("p", { class: "signal-lead" },
      "Does the build actually contain everything the brief asked for? A Nemotron model reads the generated page against the prompt and itemises what's present, what's missing, and anything that contradicts the brief — independent of how it looks."),
    el("p", { class: "signal-grades", html:
      "<b>Grades on:</b> presence of every requested element &amp; feature (content, not visuals). Each requirement is checked off, flagged missing, or flagged as a contradiction." }),
  );
  const list = el("div", { class: "gen-cards" });
  const group = (cls, mark, label, items) => {
    if (!items || !items.length) return null;
    const reqs = el("div", { class: "reqs" });
    items.forEach(r => reqs.appendChild(el("div", { class: `req ${cls}` }, el("span", { class: "mark" }, mark), el("span", null, r))));
    return el("div", null, el("div", { class: "req-group-label" }, `${label} · ${items.length}`), reqs);
  };
  for (const g of gens) {
    const w = winnerOf(g);
    const det = signalDet(w, "prompt_consistency");
    const card = el("div", { class: "gen-card" },
      el("div", { class: "gen-top" }, el("span", { class: "g" }, g.id), scoreSpan(critScore10(w, "prompt_consistency"))));
    if (!det) {
      card.appendChild(el("div", { class: "empty-inline" }, "not scored in this run"));
    } else {
      [group("met", "✓", "met", det.matched),
       group("miss", "✗", "missing", det.missing),
       group("contra", "⚠", "contradictions", det.contradictions)].forEach(n => n && card.appendChild(n));
      if (det.rationale) card.appendChild(el("div", { class: "rationale" }, "“" + det.rationale + "”"));
    }
    list.appendChild(card);
  }
  wrap.appendChild(list);
  return wrap;
}

/* stress_test — agentic / heuristic interaction QA in a real browser. */
function renderStressTestSection(gens) {
  if (!signalActiveAnywhere(gens, "stress_test")) return null;
  const wrap = el("section", { class: "signal-section" },
    el("div", { class: "head" },
      el("h3", null, "Interaction QA"),
      el("span", { class: "badge live" }, "agentic stress test")),
    el("p", { class: "signal-lead" },
      "Do the buttons and links actually work? Persona agents (or a deterministic probe) drive the real page in a headless browser — clicking, typing, navigating — and report what's broken. Pure behaviour: it ignores looks and copy."),
    el("p", { class: "signal-grades", html:
      "<b>Grades on:</b> whether interactive elements respond and behave consistently — dead links, missing handlers, JS console errors, broken forms." }),
  );
  const list = el("div", { class: "gen-cards" });
  for (const g of gens) {
    const w = winnerOf(g);
    const det = signalDet(w, "stress_test");
    const card = el("div", { class: "gen-card" },
      el("div", { class: "gen-top" }, el("span", { class: "g" }, g.id), scoreSpan(critScore10(w, "stress_test"))));
    if (!det) { card.appendChild(el("div", { class: "empty-inline" }, "not scored in this run")); list.appendChild(card); continue; }

    // heuristic-probe mode: a counts summary
    const s = det.summary;
    if (s && typeof s === "object") {
      const chips = el("div", { class: "stat-chips" });
      const add = (label, val, warn) => { if (val == null) return; chips.appendChild(el("div", { class: `stat-chip ${warn ? "warn" : ""}` }, label + " ", el("strong", null, String(val)))); };
      add("interactive", s.n_interactive);
      add("dead", s.n_dead, s.n_dead > 0);
      add("clicked", s.n_clicked);
      add("console errors", s.n_with_console_errors, s.n_with_console_errors > 0);
      if (chips.childNodes.length) card.appendChild(chips);
    }

    // subagent mode: one row per persona
    if (Array.isArray(det.personas)) {
      det.personas.forEach(p => {
        const ok = p.goal_achieved ? "ok" : "fail";
        const row = el("div", { class: `persona ${ok}` },
          el("div", null,
            el("span", { class: "pname" }, p.persona || p.name || "persona"),
            el("span", { class: "pgoal-met" }, p.goal_achieved ? "goal met" : "goal failed")));
        if (p.summary) row.appendChild(el("div", { class: "psum" }, p.summary));
        card.appendChild(row);
      });
    }

    // issues — may be plain strings OR {severity, description}
    const issues = Array.isArray(det.issues) ? det.issues : [];
    if (issues.length) {
      card.appendChild(el("div", { class: "req-group-label" }, `issues · ${issues.length}`));
      issues.slice(0, 8).forEach(it => {
        const obj = it && typeof it === "object";
        const sev = ((obj ? it.severity : null) || "medium").toLowerCase();
        const desc = obj ? (it.description || JSON.stringify(it)) : String(it);
        card.appendChild(el("div", { class: `sig-issue sev-${sev}` },
          el("span", { class: "sev" }, sev), el("span", { class: "desc" }, desc)));
      });
    }

    if (det.function_notes) card.appendChild(el("div", { class: "note-block" }, el("span", { class: "lbl" }, "function"), det.function_notes));
    if (det.consistency_notes) card.appendChild(el("div", { class: "note-block" }, el("span", { class: "lbl" }, "consistency"), det.consistency_notes));
    list.appendChild(card);
  }
  wrap.appendChild(list);
  return wrap;
}

/* brain_judge — the perceptual "design classifier". Always rendered (even with
   no data yet) so the user can see what it grades on now that it's enabled. */
function renderBrainJudgeSection(gens) {
  const active = signalActiveAnywhere(gens, "brain_judge");
  const wrap = el("section", { class: "signal-section" },
    el("div", { class: "head" },
      el("h3", null, "Design classifier"),
      el("span", { class: `badge ${active ? "live" : ""}` }, active ? "perceptual model" : "awaiting first run")),
    el("p", { class: "signal-lead" },
      "A classifier (RBF SVM, cross-validated AUC 0.85) trained on award-winning sites versus mass-produced AI slop. It reads the screenshot's perceptual fingerprint and returns the probability the design belongs with the good set."),
    el("p", { class: "signal-grades", html:
      "<b>Grades on:</b> perceptual design statistics — clutter, colour discipline, contrast, whitespace, symmetry, palette entropy. Despite the internal “brain” framing this is <b>not</b> real brain data; it's the swap-in seam for Meta's TRIBE-v2." }),
  );

  // What it looks at — a fixed legend of the perceptual features.
  const FEATURES = [
    ["edge density", "visual clutter"], ["contrast", "figure / ground"],
    ["colourfulness", "palette intensity"], ["saturation", "colour discipline"],
    ["whitespace", "breathing room"], ["hue entropy", "palette focus"],
    ["symmetry", "layout regularity"], ["top contrast", "hero separation"],
  ];
  const fg = el("div", { class: "feature-grid" });
  FEATURES.forEach(([k, v]) => fg.appendChild(el("div", { class: "f" }, el("span", null, k), el("span", { class: "fk" }, v))));
  wrap.appendChild(fg);

  const list = el("div", { class: "gen-cards", style: "margin-top:18px" });
  let any = false;
  for (const g of gens) {
    const w = winnerOf(g);
    const det = signalDet(w, "brain_judge");
    if (!det) continue;
    any = true;
    const p = typeof det.p_good === "number" ? det.p_good : null;
    const card = el("div", { class: "gen-card" },
      el("div", { class: "gen-top" }, el("span", { class: "g" }, g.id), scoreSpan(critScore10(w, "brain_judge"))));
    card.appendChild(el("div", { class: "pgood-bar" },
      el("div", { class: "fill", style: `width:${p != null ? (p * 100).toFixed(1) : 0}%` }),
      el("div", { class: "mid" }),
      el("div", { class: "txt" }, p != null ? `P(good) ${(p * 100).toFixed(0)}%  ·  midline = 50/50` : "—")));
    const backend = det.encoder_backend || "—";
    const fallback = backend === "perceptual-fallback";
    card.appendChild(el("div", { class: `backend-note ${fallback ? "fallback" : ""}` },
      `backend: ${backend}${fallback ? "  (perceptual stand-in — no real brain model)" : ""}`));
    list.appendChild(card);
  }
  if (!any) list.appendChild(el("div", { class: "empty-inline" },
    "No generation has been scored by this classifier yet — it runs on the next /autodesign loop."));
  wrap.appendChild(list);
  return wrap;
}

// ============================================================
// lightbox
// ============================================================
function openLightbox(cand) {
  document.getElementById("lightbox-title").textContent = `${cand.id} · ${cand.combined != null ? cand.combined.toFixed(2) : "—"}`;
  document.getElementById("lightbox-iframe").src = cand.html || "about:blank";
  document.getElementById("lightbox").classList.add("open");
}
function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.getElementById("lightbox-iframe").src = "about:blank";
}
document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });

// ============================================================
// nav + boot
// ============================================================
function setView(v) {
  STATE.view = v;
  stopPlay();
  for (const b of document.querySelectorAll(".nav button")) {
    b.classList.toggle("active", b.dataset.view === v);
  }
  if (v === "evolution") renderEvolution();
  else renderMetrics();
}
for (const b of document.querySelectorAll(".nav button")) {
  b.addEventListener("click", () => setView(b.dataset.view));
}

async function loadRun(rid) {
  stopPlay();
  STATE.runId = rid;
  const m = await jget(`/api/run/${rid}`);
  STATE.manifest = m;
  STATE.scrubIndex = bestIndex(m.generations);  // start on the best gen
  const bestGen = m.generations[STATE.scrubIndex];
  STATE.candIndex = Math.max(0, bestGen.candidates.findIndex(c => c.id === bestGen.winner));
  STATE.showSaliency = false;
  const stat = document.getElementById("meta-stat");
  const wn = winnerOf(bestGen);
  stat.textContent = `${m.generations.length} gens · best ${bestGen.id} · ${wn?.combined?.toFixed(2) ?? "—"}`;
  setView(STATE.view);
}

async function boot() {
  const { runs = [] } = await jget("/api/runs");
  STATE.runs = runs;
  const picker = document.getElementById("run-picker");
  picker.innerHTML = "";
  if (runs.length === 0) {
    document.getElementById("main").innerHTML =
      `<p class="empty">No runs yet. Trigger <code>/autodesign &lt;brief&gt;</code> from chat.</p>`;
    return;
  }
  for (const r of runs) picker.appendChild(el("option", { value: r }, r));
  picker.value = runs[0];
  picker.addEventListener("change", () => loadRun(picker.value));
  await loadRun(runs[0]);
}

boot().catch(err => {
  document.getElementById("main").innerHTML =
    `<p class="empty">Failed to load: ${err.message}. Is dashboard/serve.py running?</p>`;
});
