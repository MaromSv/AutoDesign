<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AutoDesign</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --paper:   #f7f2ea;
      --paper-2: #efe7d8;
      --rule:    #1c1814;
      --ink:     #1c1814;
      --ink-2:   #5b554d;
      --ink-3:   #8c867c;
      --accent:  #b8480f;   /* terracotta */
      --accent-soft: #e9c8a8;
      --good:    #2f7a3a;
      --bad:     #b53b3b;
      --serif:   "Fraunces", ui-serif, Georgia, serif;
      --sans:    "Inter", ui-sans-serif, system-ui, sans-serif;
      --mono:    "JetBrains Mono", ui-monospace, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--paper); color: var(--ink);
      font-family: var(--sans); font-size: 15px; line-height: 1.55;
    }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid currentColor; }
    a:hover { color: var(--ink); }
    button { font: inherit; }

    /* ---- top bar (editorial masthead) ----------------------------------- */
    header.masthead {
      border-bottom: 1px solid var(--rule);
      padding: 14px 32px;
      display: flex; align-items: center; gap: 28px;
      background: var(--paper);
    }
    .brand { display: flex; align-items: center; }
    .brand img {
      display: block; height: 40px; width: auto;
      /* multiply blends the PNG's white background into the cream paper
         while leaving the black wordmark + orange mark intact */
      mix-blend-mode: multiply;
    }
    .nav { display: flex; gap: 0; align-self: end; }
    .meta { margin-left: auto; }
    .nav button {
      background: transparent; border: 0; padding: 6px 16px 10px;
      font-family: var(--serif); font-size: 16px; color: var(--ink-3);
      cursor: pointer; border-bottom: 2px solid transparent;
      letter-spacing: 0.01em;
    }
    .nav button:hover { color: var(--ink); }
    .nav button.active {
      color: var(--ink); border-bottom-color: var(--accent);
    }
    .meta { font-family: var(--mono); font-size: 11px; color: var(--ink-3); text-align: right; }
    .meta select {
      background: transparent; color: var(--ink); border: 0;
      font: inherit; padding: 0; cursor: pointer;
      border-bottom: 1px dashed var(--ink-3);
    }
    .meta .stat { display: block; margin-top: 4px; }

    main { padding: 0; }

    /* ---- generic layout ------------------------------------------------- */
    .spread { padding: 36px 48px; max-width: 1400px; margin-inline: auto; }
    .spread.narrow { max-width: 900px; }

    .eyebrow {
      font-family: var(--mono); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--ink-3); margin-bottom: 12px;
    }
    .display {
      font-family: var(--serif); font-weight: 500;
      font-size: clamp(40px, 4.5vw, 64px); line-height: 1.02;
      letter-spacing: -0.015em; margin: 0;
    }
    .body-lead {
      font-family: var(--serif); font-style: italic; font-weight: 400;
      font-size: 20px; line-height: 1.4; color: var(--ink-2); margin: 12px 0 0;
      max-width: 56ch;
    }
    .empty {
      padding: 80px 24px; color: var(--ink-3); text-align: center;
      font-family: var(--serif); font-size: 18px; font-style: italic;
    }

    /* ============================================================ */
    /* PAGE 1 — EVOLUTION                                            */
    /* ============================================================ */
    .evo-hero {
      display: grid; grid-template-columns: 1fr 1.7fr; gap: 56px;
      padding: 56px 48px 24px; max-width: 1500px; margin-inline: auto;
    }
    .evo-info { padding-top: 28px; }
    .evo-info .gen-label {
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink-3);
    }
    .evo-info .gen-score {
      font-family: var(--serif); font-weight: 500;
      font-size: 96px; line-height: 0.95; letter-spacing: -0.03em;
      margin: 8px 0 4px; color: var(--ink);
    }
    .evo-info .gen-score sup {
      font-size: 32px; vertical-align: top; color: var(--ink-3);
      margin-left: 6px; font-weight: 400;
    }
    .evo-info .delta {
      font-family: var(--mono); font-size: 14px; color: var(--ink-3);
    }
    .delta.pos { color: var(--good); }
    .delta.neg { color: var(--bad); }
    .delta.flat { color: var(--ink-3); }
    .evo-info .gen-headline {
      font-family: var(--serif); font-style: italic; font-weight: 400;
      font-size: 22px; line-height: 1.35; color: var(--ink-2);
      margin: 28px 0 0; max-width: 36ch;
    }
    .evo-info .gen-changed {
      font-family: var(--sans); font-size: 13px; color: var(--ink-3);
      margin-top: 16px; max-width: 42ch; line-height: 1.55;
    }
    .evo-info .gen-changed strong { color: var(--ink-2); font-weight: 600; }

    /* stage (image area) */
    .stage-shell {
      display: flex; flex-direction: column; gap: 12px;
    }
    .stage {
      position: relative; aspect-ratio: 1280 / 800;
      background: #fff; border: 1px solid var(--rule);
      overflow: hidden;
      box-shadow: 0 18px 40px -22px rgba(28,24,20,0.35);
    }
    .stage .layer {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: top;
      opacity: 0; transition: opacity 380ms ease;
      pointer-events: none;
    }
    .stage .layer.active { opacity: 1; }
    /* Saliency layer rides on top of the iframe so the animation plays
       underneath while the heatmap stays visible the whole time.
       `lighten` keeps cold regions of the heatmap from darkening the
       iframe — only the hot inferno colors win over the page underneath.
       (For runs whose saliency.png is the newer heat-only RGBA, the PNG's
       alpha channel makes cold regions transparent anyway, so `lighten`
       still does the right thing.) */
    .stage .saliency-layer { mix-blend-mode: lighten; z-index: 2; }

    /* Scanpath layer: numbered fixation order over the stage, drawn from
       saliency.details.scanpath_norm. Toggled together with the heatmap. */
    .stage .scanpath-layer {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0; transition: opacity 220ms ease;
      z-index: 3;
    }
    .stage .scanpath-layer.active { opacity: 1; }
    .stage .scanpath-layer svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
    }
    .stage .scanpath-layer .sp-line {
      stroke: var(--accent); stroke-width: 2;
      fill: none; opacity: 0.9;
      /* Subtle white halo so the path reads on both dark and light pages */
      filter: drop-shadow(0 0 1.5px rgba(255,255,255,0.85));
    }
    .stage .scanpath-layer .sp-dot {
      position: absolute; width: 22px; height: 22px;
      transform: translate(-50%, -50%);
      border-radius: 50%; background: #fff; border: 2px solid var(--accent);
      display: grid; place-items: center;
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      color: var(--ink);
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    }
    .stage .scanpath-layer .sp-dot.first {
      background: var(--accent); color: #fff; border-color: #fff;
    }
    .stage .frame-layer {
      position: absolute; top: 0; left: 0;
      width: 1280px; height: 800px;
      border: 0; background: transparent;
      transform-origin: top left;
      pointer-events: none; z-index: 1;
    }
    .stage .empty-layer {
      position: absolute; inset: 0; display: grid; place-items: center;
      color: var(--ink-3); font-family: var(--serif); font-style: italic;
    }

    /* nav arrows on the stage (visible only when there are siblings) */
    .stage .nav-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.92); color: var(--ink);
      border: 1px solid var(--rule);
      font-family: var(--serif); font-size: 24px; line-height: 1;
      cursor: pointer; display: grid; place-items: center;
      opacity: 0; transition: opacity 160ms ease;
      z-index: 3;
    }
    .stage:hover .nav-arrow { opacity: 1; }
    .stage .nav-arrow:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .stage .nav-arrow.prev { left: 12px; }
    .stage .nav-arrow.next { right: 12px; }
    .stage .nav-arrow[disabled] { opacity: 0 !important; pointer-events: none; }

    /* corner badge showing which candidate is on stage */
    .stage .stage-badge {
      position: absolute; top: 12px; left: 12px;
      background: rgba(255,255,255,0.92); border: 1px solid var(--rule);
      padding: 6px 10px; font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.06em; color: var(--ink);
      z-index: 3;
    }
    .stage .stage-badge .star { color: var(--accent); font-weight: 600; }
    .stage .open-live {
      position: absolute; bottom: 12px; right: 12px;
      background: var(--accent); color: #fff; border: 1px solid var(--accent);
      padding: 6px 10px; font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.04em; cursor: pointer;
      z-index: 3;
    }

    /* below-stage controls bar: dots + saliency toggle + auto-play */
    .stage-bar {
      display: flex; align-items: center; gap: 20px;
      padding: 4px 0 0; flex-wrap: wrap;
    }
    .sib-dots { display: flex; align-items: center; gap: 8px; }
    .sib-dots .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--paper);
      border: 1.5px solid var(--rule);
      cursor: pointer; transition: all 140ms ease;
    }
    .sib-dots .dot:hover { border-color: var(--accent); }
    .sib-dots .dot.active { background: var(--accent); border-color: var(--accent); }
    .sib-dots .dot.winner { box-shadow: 0 0 0 3px var(--accent-soft); }
    .sib-dots .count {
      font-family: var(--mono); font-size: 11px; color: var(--ink-3);
      letter-spacing: 0.06em; margin-left: 4px;
    }
    .play-btn {
      background: transparent; border: 1px solid var(--rule);
      color: var(--ink); padding: 6px 12px; cursor: pointer;
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .play-btn:hover { background: var(--ink); color: var(--paper); }
    .play-btn.playing { background: var(--accent); color: #fff; border-color: var(--accent); }

    .stage-bar .spacer { flex: 1; }

    /* yes/no toggle (saliency overlay) */
    .toggle {
      display: inline-flex; align-items: center; gap: 12px;
      cursor: pointer; user-select: none;
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink-3);
    }
    .toggle .label-no, .toggle .label-yes {
      transition: color 140ms ease;
    }
    .toggle .switch {
      width: 40px; height: 22px; border-radius: 999px;
      background: var(--rule); position: relative;
      transition: background 180ms ease;
    }
    .toggle .switch::after {
      content: ""; position: absolute; top: 2px; left: 2px;
      width: 18px; height: 18px; border-radius: 50%; background: var(--paper);
      transition: transform 180ms cubic-bezier(.4,1.4,.5,1);
    }
    .toggle.on .switch { background: var(--accent); }
    .toggle.on .switch::after { transform: translateX(18px); }
    .toggle .label-no { color: var(--ink); }
    .toggle.on .label-no { color: var(--ink-3); }
    .toggle.on .label-yes { color: var(--ink); }
    .toggle:hover .switch { box-shadow: 0 0 0 4px var(--accent-soft); }

    /* slider */
    .scrubber-wrap {
      max-width: 1500px; margin: 16px auto 0; padding: 0 48px 32px;
    }
    .scrubber {
      position: relative; height: 96px;
      border-top: 1px solid var(--rule);
    }
    .scrubber .track {
      position: absolute; left: 0; right: 0; top: 28px;
      height: 1px; background: var(--rule); opacity: 0.18;
    }
    .scrubber .progress {
      position: absolute; left: 0; top: 28px;
      height: 1px; background: var(--accent); opacity: 0.7;
      transition: width 250ms ease;
    }
    .scrubber .tick {
      position: absolute; top: 16px; transform: translateX(-50%);
      cursor: pointer; user-select: none; width: 80px; text-align: center;
    }
    .scrubber .tick .dot {
      width: 12px; height: 12px; margin: 0 auto;
      border-radius: 50%; background: var(--paper);
      border: 1.5px solid var(--rule);
      transition: background 160ms, border-color 160ms, transform 160ms;
    }
    .scrubber .tick.active .dot {
      background: var(--accent); border-color: var(--accent);
      transform: scale(1.25);
    }
    .scrubber .tick.best .dot {
      border-color: var(--accent);
    }
    .scrubber .tick .lbl {
      margin-top: 8px; font-family: var(--mono); font-size: 11px;
      color: var(--ink-3); letter-spacing: 0.05em;
    }
    .scrubber .tick.active .lbl { color: var(--ink); }
    .scrubber .tick .val {
      margin-top: 2px; font-family: var(--serif); font-size: 14px;
      color: var(--ink-2);
    }
    .scrubber .tick.active .val { color: var(--ink); font-weight: 500; }
    .scrubber .helper {
      position: absolute; bottom: 0; left: 0; right: 0;
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink-3);
      display: flex; justify-content: space-between;
    }

    /* criterion strip */
    .criteria {
      max-width: 1500px; margin: 0 auto; padding: 8px 48px 24px;
      display: grid; gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    .crit {
      padding: 12px 0; border-top: 1px solid var(--rule);
    }
    .crit .k {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-3);
    }
    .crit .v {
      font-family: var(--serif); font-size: 28px; font-weight: 500;
      line-height: 1; margin-top: 6px; color: var(--ink);
    }
    .crit .src {
      font-family: var(--mono); font-size: 10px; color: var(--ink-3);
      margin-top: 4px;
    }
    .crit .d {
      font-family: var(--mono); font-size: 12px; margin-top: 4px;
    }
    .crit .why {
      margin-top: 8px;
      font-family: var(--serif); font-style: italic; font-size: 12.5px;
      line-height: 1.4; color: var(--ink-2);
    }

    /* siblings drawer (gen-0 fan-out) */
    .siblings {
      max-width: 1500px; margin: 0 auto; padding: 24px 48px 48px;
      border-top: 1px solid var(--rule);
    }
    .siblings h3 {
      margin: 0 0 16px; font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-3); font-weight: 500;
    }
    .sib-grid {
      display: grid; gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    }
    .sib {
      cursor: pointer; background: var(--paper);
      transition: transform 160ms ease;
    }
    .sib:hover { transform: translateY(-2px); }
    .sib .shot {
      aspect-ratio: 1280 / 800; background: #fff;
      border: 1px solid var(--rule); overflow: hidden;
    }
    .sib .shot img {
      width: 100%; height: 100%; object-fit: cover; object-position: top;
      filter: saturate(0.95);
    }
    .sib.winner .shot {
      border: 1.5px solid var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .sib .info {
      margin-top: 8px; display: flex; justify-content: space-between;
      align-items: baseline; font-family: var(--mono); font-size: 11px;
    }
    .sib .info .name { color: var(--ink-2); }
    .sib .info .score { color: var(--ink); font-weight: 600; }
    .sib.winner .info .name { color: var(--accent); }
    .sib.winner .info .name::after { content: " · winner"; font-style: italic; }

    /* ============================================================ */
    /* PAGE 2 — METRICS                                              */
    /* ============================================================ */
    .metrics-head { padding: 56px 48px 24px; max-width: 1500px; margin-inline: auto; }
    .metrics-grid {
      max-width: 1500px; margin-inline: auto; padding: 0 48px 48px;
      display: grid; gap: 48px; grid-template-columns: 1fr;
    }
    .chart-card {
      border-top: 1px solid var(--rule); padding-top: 20px;
    }
    .chart-card .head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 14px;
    }
    .chart-card h3 {
      margin: 0; font-family: var(--serif); font-weight: 500; font-size: 22px;
      letter-spacing: -0.005em;
    }
    .chart-card .head .now {
      font-family: var(--mono); font-size: 13px; color: var(--ink-3);
    }
    .chart-card .head .now strong { color: var(--ink); font-weight: 600; }
    .chart-card .head .now .d { margin-left: 8px; }
    .chart-card svg { width: 100%; display: block; }
    .chart-headline svg { height: 260px; }
    .chart-small  svg { height: 130px; }

    .small-multiples {
      display: grid; gap: 36px 48px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    /* svg chart helpers */
    .axis-line { stroke: var(--rule); stroke-width: 1; opacity: 0.45; }
    .axis-line.faint { stroke-dasharray: 2 4; opacity: 0.18; }
    .axis-tick { font-family: var(--mono); font-size: 10px; fill: var(--ink-3); }
    .series-line { fill: none; stroke: var(--accent); stroke-width: 2; }
    .series-area { fill: var(--accent); opacity: 0.10; }
    .series-dot { fill: var(--accent); stroke: var(--paper); stroke-width: 1.5; }
    .series-dot.best { stroke: var(--accent); fill: var(--paper); stroke-width: 2.5; }
    .series-value { font-family: var(--mono); font-size: 11px; fill: var(--ink); font-weight: 500; }

    /* lightbox */
    .lightbox {
      position: fixed; inset: 0; z-index: 50; background: rgba(28,24,20,0.78);
      display: none; padding: 32px;
    }
    .lightbox.open { display: grid; grid-template-rows: auto 1fr; gap: 14px; }
    .lightbox .top {
      display: flex; justify-content: space-between; align-items: center;
      color: var(--paper); font-family: var(--serif); font-size: 18px; font-style: italic;
    }
    .lightbox .top button {
      background: var(--paper); color: var(--ink); border: 0; padding: 6px 14px;
      cursor: pointer; font-family: var(--mono); font-size: 12px;
    }
    .lightbox .body { display: grid; grid-template-columns: 1fr; gap: 14px; min-height: 0; }
    .lightbox iframe {
      width: 100%; height: 100%; background: white;
      border: 1px solid var(--rule);
    }
  </style>
</head>
<body>

<header class="masthead">
  <div class="brand"><img src="/logo.png" alt="autodesign." /></div>
  <nav class="nav">
    <button data-view="evolution" class="active">Evolution</button>
    <button data-view="metrics">Metrics</button>
  </nav>
  <div class="meta">
    <select id="run-picker"></select>
    <span class="stat" id="meta-stat"></span>
  </div>
</header>

<main id="main">
  <p class="empty">Loading…</p>
</main>

<div class="lightbox" id="lightbox">
  <div class="top">
    <span id="lightbox-title"></span>
    <button id="lightbox-close">close (esc)</button>
  </div>
  <div class="body">
    <iframe id="lightbox-iframe" sandbox="allow-same-origin allow-scripts"></iframe>
  </div>
</div>

<script>
// ============================================================
// state
// ============================================================
const STATE = {
  runs: [],
  runId: null,
  manifest: null,
  view: "evolution",        // "evolution" | "metrics"
  scrubIndex: 0,            // index into generations
  candIndex: 0,             // which sibling within current gen is on stage
  // Saliency toggle is a "sticky" UI preference: once the user turns it on
  // it stays on across candidate flips, gen scrubs, and run switches —
  // it only flips when the user clicks the toggle again.
  showSaliency: false,
  playTimer: null,          // interval id for auto-cycle through siblings
  stageSal: null,           // saliency layer (heatmap PNG)
  stagePath: null,          // scanpath layer (1→2→…→N fixation order)
  stageFrame: null,         // live iframe layer showing the candidate's actual HTML
  stageRO: null,            // ResizeObserver to keep the iframe scale matched to the stage box
};

const SUB_LABELS = {
  intent_alignment:   "intent alignment",
  focus_clarity:      "focus clarity",
  reading_order:      "reading order",
  animation_focus:    "animation focus",
  // legacy keys (left in so historical runs still pretty-print)
  hero_pull:          "hero pull",
  focal_dominance:    "focal dominance",
  composition_spread: "spread",
  scan_rhythm:        "scan rhythm",
};

// ============================================================
// utils
// ============================================================
async function jget(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url} ${r.status}`);
  return r.json();
}
function el(tag, attrs, ...kids) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "class") e.className = v;
      else if (k === "on") for (const [ev, fn] of Object.entries(v)) e.addEventListener(ev, fn);
      else if (k === "html") e.innerHTML = v;
      else if (v != null) e.setAttribute(k, v);
    }
  }
  for (const k of kids) {
    if (k == null || k === false) continue;
    e.append(typeof k === "string" || typeof k === "number" ? String(k) : k);
  }
  return e;
}
function svgNode(tag, attrs) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (v != null) e.setAttribute(k, v);
  }
  return e;
}
function fmt(x, d = 2) {
  if (x == null) return "—";
  if (typeof x !== "number") return String(x);
  return x.toFixed(d);
}
function prettyKey(k) { return SUB_LABELS[k] || k.replace(/_/g, " "); }

function bestIndex(gens) {
  let bi = 0, bv = -Infinity;
  gens.forEach((g, i) => {
    const c = winnerOf(g);
    const v = c?.combined ?? -Infinity;
    if (v > bv) { bv = v; bi = i; }
  });
  return bi;
}
function winnerOf(gen) {
  return gen.candidates.find(c => c.id === gen.winner) || gen.candidates[0];
}

/** Per-generation series for a given criterion key (winner only). */
function seriesFor(gens, key) {
  return gens.map(g => {
    const w = winnerOf(g);
    const c = (w?.criteria || []).find(x => x.key === key);
    return c?.score ?? null;
  });
}
/** Per-generation series for the combined (engine-level) score. */
function combinedSeries(gens) {
  return gens.map(g => winnerOf(g)?.combined ?? null);
}

/** Union of criterion keys present across all winners. Ordered by first appearance. */
function criterionKeys(gens) {
  const seen = new Set();
  const order = [];
  for (const g of gens) {
    for (const c of (winnerOf(g)?.criteria || [])) {
      if (!seen.has(c.key)) { seen.add(c.key); order.push(c.key); }
    }
  }
  return order;
}

// ============================================================
// rendering — evolution page
// ============================================================
function renderEvolution() {
  stopPlay();
  const m = STATE.manifest;
  const gens = m.generations;
  if (!gens.length) {
    document.getElementById("main").innerHTML = `<p class="empty">No generations yet.</p>`;
    return;
  }
  const main = document.getElementById("main");
  main.innerHTML = "";

  const gen = gens[STATE.scrubIndex];
  if (STATE.candIndex >= gen.candidates.length) STATE.candIndex = 0;

  const info = el("div", { class: "evo-info", id: "evo-info" });
  const stageShell = el("div", { class: "stage-shell" }, buildStageShell(gen));
  main.appendChild(el("section", { class: "evo-hero" }, info, stageShell));
  paintInfo(gen);

  main.appendChild(renderScrubber(gens));

  main.appendChild(el("div", { class: "criteria", id: "criteria-strip" }));
  paintCriteria(gen);
}

function buildStageShell(gen) {
  const stage = el("div", { class: "stage" });
  STATE.stageFrame = el("iframe", {
    class: "layer frame-layer",
    sandbox: "allow-same-origin allow-scripts",
    loading: "eager",
    title: "candidate preview",
  });
  STATE.stageSal = el("img", { class: "layer saliency-layer", alt: "saliency overlay" });
  STATE.stagePath = el("div", { class: "scanpath-layer", "aria-label": "predicted fixation order" });
  stage.appendChild(STATE.stageFrame);
  stage.appendChild(STATE.stageSal);
  stage.appendChild(STATE.stagePath);

  if (STATE.stageRO) { STATE.stageRO.disconnect(); }
  STATE.stageRO = new ResizeObserver(entries => {
    for (const e of entries) {
      const w = e.contentRect.width;
      if (w > 0) STATE.stageFrame.style.transform = `scale(${w / 1280})`;
    }
  });
  STATE.stageRO.observe(stage);

  const badge = el("div", { class: "stage-badge", id: "stage-badge" });
  stage.appendChild(badge);

  const prev = el("button", { class: "nav-arrow prev", title: "previous sibling" }, "‹");
  prev.addEventListener("click", e => { e.stopPropagation(); stepCand(-1); });
  const next = el("button", { class: "nav-arrow next", title: "next sibling" }, "›");
  next.addEventListener("click", e => { e.stopPropagation(); stepCand(1); });
  if (gen.candidates.length <= 1) {
    prev.setAttribute("disabled", "");
    next.setAttribute("disabled", "");
  }
  stage.appendChild(prev);
  stage.appendChild(next);

  const openLive = el("button", { class: "open-live", title: "open live page + saliency" }, "open ↗");
  openLive.addEventListener("click", e => { e.stopPropagation(); openLightbox(currentCand()); });
  stage.appendChild(openLive);

  const empty = el("div", { class: "empty-layer", id: "stage-empty", style: "display:none" }, "no frame captured");
  stage.appendChild(empty);

  const bar = el("div", { class: "stage-bar" });

  const dots = el("div", { class: "sib-dots", id: "sib-dots" });
  gen.candidates.forEach((c, i) => {
    const d = el("div", {
      class: `dot ${i === STATE.candIndex ? "active" : ""} ${c.id === gen.winner ? "winner" : ""}`,
      title: c.id + (c.id === gen.winner ? " · winner" : "")
    });
    d.addEventListener("click", () => setCand(i));
    dots.appendChild(d);
  });
  dots.appendChild(el("span", { class: "count", id: "sib-count" }));
  bar.appendChild(dots);

  if (gen.candidates.length > 1) {
    const play = el("button", { class: "play-btn", id: "play-btn" }, "▶ play");
    play.addEventListener("click", togglePlay);
    bar.appendChild(play);
  }

  bar.appendChild(el("div", { class: "spacer" }));

  if (gen.candidates.some(c => c.saliency)) {
    const toggle = el("div", { class: `toggle ${STATE.showSaliency ? "on" : ""}`, id: "saliency-toggle", title: "show DeepGaze heatmap + 1→2→…→N predicted gaze path" },
      el("span", null, "saliency"),
      el("span", { class: "label-no" }, "no"),
      el("div", { class: "switch" }),
      el("span", { class: "label-yes" }, "yes"),
    );
    toggle.addEventListener("click", () => setShowSaliency(!STATE.showSaliency));
    bar.appendChild(toggle);
  }

  setTimeout(() => paintStage(gen, /*animate=*/false), 0);

  return el("div", null, stage, bar);
}

/* Repaint the iframe + saliency overlay for the candidate currently on stage. */
function paintStage(gen, animate = true) {
  const cand = gen.candidates[STATE.candIndex];
  if (!cand) return;
  const emptyEl = document.getElementById("stage-empty");
  const haveHtml = !!cand.html;
  emptyEl.style.display = haveHtml ? "none" : "grid";

  const frame = STATE.stageFrame;
  if (haveHtml) {
    // Force a reload so the candidate's entrance animation restarts cleanly
    // every time we flip to it. The saliency overlay (if on) sits on top
    // and stays visible while this animation plays underneath.
    frame.src = "about:blank";
    requestAnimationFrame(() => { frame.src = cand.html; });
    frame.classList.add("active");
  } else {
    frame.classList.remove("active");
    frame.src = "about:blank";
  }
  if (!animate) {
    frame.style.transition = "none";
    requestAnimationFrame(() => { frame.style.transition = ""; });
  }

  paintSaliency();

  const badge = document.getElementById("stage-badge");
  if (badge) {
    badge.innerHTML = "";
    badge.append(cand.id);
    if (cand.id === gen.winner) {
      badge.appendChild(el("span", { class: "star" }, "  ★ winner"));
    }
  }

  const dotsRoot = document.getElementById("sib-dots");
  if (dotsRoot) {
    const dots = dotsRoot.querySelectorAll(".dot");
    dots.forEach((d, i) => d.classList.toggle("active", i === STATE.candIndex));
    const count = document.getElementById("sib-count");
    if (count) count.textContent = `${STATE.candIndex + 1} of ${gen.candidates.length}`;
  }
}

/* Update the saliency overlay layer + the 1→2→…→N scanpath layer.
   Does NOT touch the iframe so we never restart a running animation
   just to flip the heatmap on/off. */
function paintSaliency() {
  const cand = currentCand();
  // --- heatmap layer
  if (STATE.stageSal) {
    if (cand?.saliency) {
      if (STATE.stageSal.getAttribute("src") !== cand.saliency) {
        STATE.stageSal.src = cand.saliency;
      }
      STATE.stageSal.classList.toggle("active", !!STATE.showSaliency);
    } else {
      STATE.stageSal.classList.remove("active");
      STATE.stageSal.removeAttribute("src");
    }
  }
  // --- scanpath layer (numbered fixation order)
  renderScanpath(cand);
}

/* Draw the predicted gaze path as numbered dots connected by a dashed
   line. Coords come from saliency.details.scanpath_norm — each entry is
   [x, y] in [0, 1] relative to the scored frame. Missing data (older
   runs that pre-date the scanpath_norm field) → empty layer, the heatmap
   alone still shows. Visibility tracks STATE.showSaliency. */
function renderScanpath(cand) {
  const layer = STATE.stagePath;
  if (!layer) return;
  const path = cand?.details?.saliency?.details?.scanpath_norm;
  layer.innerHTML = "";
  if (!path || !path.length) {
    layer.classList.remove("active");
    return;
  }
  // Connecting saccade polyline. percent coords inside a 0–100 viewBox so
  // it stretches with the stage exactly the way the heatmap does.
  const pts = path.map(([x, y]) => `${(x * 100).toFixed(2)},${(y * 100).toFixed(2)}`).join(" ");
  const svgNs = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNs, "svg");
  svg.setAttribute("viewBox", "0 0 100 100");
  svg.setAttribute("preserveAspectRatio", "none");
  const line = document.createElementNS(svgNs, "polyline");
  line.setAttribute("points", pts);
  line.setAttribute("class", "sp-line");
  // viewBox is non-square stretched, so the dash pattern stays
  // visually consistent if we use a small absolute width.
  line.setAttribute("vector-effect", "non-scaling-stroke");
  svg.appendChild(line);
  layer.appendChild(svg);
  // Numbered dots on top of the line.
  path.forEach(([x, y], i) => {
    const dot = el("div", {
      class: `sp-dot ${i === 0 ? "first" : ""}`,
      style: `left:${(x * 100).toFixed(2)}%;top:${(y * 100).toFixed(2)}%`,
      title: `fixation ${i + 1}`,
    }, String(i + 1));
    layer.appendChild(dot);
  });
  layer.classList.toggle("active", !!STATE.showSaliency);
}

function paintInfo(gen) {
  const prevGen = STATE.scrubIndex > 0 ? STATE.manifest.generations[STATE.scrubIndex - 1] : null;
  const cand = currentCand();
  const winner = winnerOf(gen);
  const prevWinner = prevGen ? winnerOf(prevGen) : null;
  const isMulti = gen.candidates.length > 1;

  const showScore = cand?.combined;
  const winnerScore = winner?.combined;
  const delta = (showScore != null && prevWinner?.combined != null) ? showScore - prevWinner.combined : null;

  const info = document.getElementById("evo-info");
  info.innerHTML = "";
  info.appendChild(el("div", { class: "gen-label" }, gen.id.toUpperCase() + (isMulti ? ` · ${cand?.id ?? ""}` : "")));
  info.appendChild(el("div", { class: "gen-score" },
    showScore != null ? showScore.toFixed(2) : "—",
    el("sup", null, "/ 10"),
  ));
  if (isMulti && cand?.id !== gen.winner && winnerScore != null) {
    info.appendChild(el("div", { class: "delta flat" }, `winner of this gen: ${winnerScore.toFixed(2)} (${gen.winner})`));
  } else {
    info.appendChild(el("div", { class: `delta ${deltaClass(delta)}` },
      isMulti ? "click dots to flip · play to auto-cycle" : deltaText(delta)));
  }
  if (cand?.hypothesis) {
    info.appendChild(el("p", { class: "gen-headline" }, "“" + cand.hypothesis.replace(/^hypothesis:\s*/i, "") + "”"));
  }
}

function paintCriteria(gen) {
  const prevGen = STATE.scrubIndex > 0 ? STATE.manifest.generations[STATE.scrubIndex - 1] : null;
  const prevCand = prevGen ? winnerOf(prevGen) : null;
  const cand = currentCand();
  const host = document.getElementById("criteria-strip");
  if (!host) return;
  host.innerHTML = "";
  if (!cand || !cand.criteria || cand.criteria.length === 0) return;
  const prevByKey = Object.fromEntries((prevCand?.criteria || []).map(c => [c.key, c.score]));
  for (const c of cand.criteria) {
    const prev = prevByKey[c.key];
    const d = (c.score != null && prev != null) ? c.score - prev : null;
    const dtxt = d == null ? "" : (Math.abs(d) < 0.005 ? "±.00" : (d > 0 ? `+${d.toFixed(2)}` : d.toFixed(2)));
    const dcls = d == null ? "flat" : (Math.abs(d) < 0.005 ? "flat" : (d > 0 ? "pos" : "neg"));
    const why = explanationFor(cand, c);
    host.appendChild(el("div", { class: "crit" },
      el("div", { class: "k" }, prettyKey(c.key)),
      el("div", { class: "v" }, c.score != null ? c.score.toFixed(2) : "—"),
      el("div", { class: `d delta ${dcls}` }, dtxt),
      el("div", { class: "src" }, c.source && c.source !== c.key ? "from " + c.source : ""),
      why ? el("div", { class: "why" }, why) : null,
    ));
  }
}

function explanationFor(cand, c) {
  const det = cand?.details?.[c.source]?.details;
  if (!det) return null;
  const ex = det.explanations;
  if (ex && typeof ex[c.key] === "string") return ex[c.key];
  return null;
}

function currentCand() {
  const gen = STATE.manifest.generations[STATE.scrubIndex];
  return gen.candidates[STATE.candIndex];
}

function setCand(i) {
  const gen = STATE.manifest.generations[STATE.scrubIndex];
  const n = gen.candidates.length;
  STATE.candIndex = ((i % n) + n) % n;
  paintStage(gen, /*animate=*/true);
  paintInfo(gen);
  paintCriteria(gen);
}
function stepCand(d) { setCand(STATE.candIndex + d); }

/* Saliency yes/no. The toggle is sticky: it stays in whichever state the
   user put it in across candidate flips, gen scrubs, and run switches. */
function setShowSaliency(v) {
  STATE.showSaliency = !!v;
  const t = document.getElementById("saliency-toggle");
  if (t) t.classList.toggle("on", STATE.showSaliency);
  // Don't touch the iframe — only the overlay layer toggles.
  paintSaliency();
}

function togglePlay() {
  if (STATE.playTimer) { stopPlay(); return; }
  const btn = document.getElementById("play-btn");
  if (btn) { btn.classList.add("playing"); btn.textContent = "■ stop"; }
  STATE.playTimer = setInterval(() => stepCand(1), 1400);
}
function stopPlay() {
  if (STATE.playTimer) { clearInterval(STATE.playTimer); STATE.playTimer = null; }
  const btn = document.getElementById("play-btn");
  if (btn) { btn.classList.remove("playing"); btn.textContent = "▶ play"; }
}

function deltaText(d) {
  if (d == null) return "first generation";
  if (Math.abs(d) < 0.005) return "±0.00 vs prev winner";
  const sign = d > 0 ? "+" : "";
  return `${sign}${d.toFixed(2)} vs prev winner`;
}
function deltaClass(d) {
  if (d == null) return "flat";
  if (Math.abs(d) < 0.005) return "flat";
  return d > 0 ? "pos" : "neg";
}

function renderScrubber(gens) {
  const combined = combinedSeries(gens);
  const best = bestIndex(gens);
  const n = gens.length;
  const wrap = el("div", { class: "scrubber-wrap" });
  const sc = el("div", { class: "scrubber" });
  sc.appendChild(el("div", { class: "track" }));

  const pct = i => n === 1 ? 50 : (i / (n - 1)) * 100;
  const progress = el("div", { class: "progress", style: `width:${pct(STATE.scrubIndex)}%` });
  sc.appendChild(progress);

  gens.forEach((g, i) => {
    const v = combined[i];
    const tick = el("div", {
      class: `tick ${i === STATE.scrubIndex ? "active" : ""} ${i === best ? "best" : ""}`,
      style: `left:${pct(i)}%`,
      on: { click: () => {
        STATE.scrubIndex = i;
        const newGen = STATE.manifest.generations[i];
        STATE.candIndex = Math.max(0, newGen.candidates.findIndex(c => c.id === newGen.winner));
        // NOTE: do NOT reset STATE.showSaliency — the toggle is sticky.
        renderEvolution();
      } },
    },
      el("div", { class: "dot" }),
      el("div", { class: "lbl" }, g.id.replace(/^gen-0*/, "gen ")),
      el("div", { class: "val" }, v != null ? v.toFixed(2) : "—"),
    );
    sc.appendChild(tick);
  });

  sc.appendChild(el("div", { class: "helper" },
    el("span", null, "first impression"),
    el("span", null, "click any gen to scrub"),
    el("span", null, "polished")));

  wrap.appendChild(sc);
  return wrap;
}

// ============================================================
// rendering — metrics page
// ============================================================
function renderMetrics() {
  const m = STATE.manifest;
  const gens = m.generations;
  const main = document.getElementById("main");
  main.innerHTML = "";

  main.appendChild(el("section", { class: "metrics-head" },
    el("div", { class: "eyebrow" }, m.brief || "AutoDesign run"),
    el("h1", { class: "display" }, "the loop, in numbers."),
    el("p", { class: "body-lead" },
      "Every criterion plotted across generations. Sub-scores are 0–1; combined is 0–10."),
  ));

  const combined = combinedSeries(gens);
  const cur = combined[combined.length - 1];
  const prev = combined.length > 1 ? combined[combined.length - 2] : null;
  const d = (cur != null && prev != null) ? cur - prev : null;
  const headlineCard = el("div", { class: "chart-card chart-headline" },
    el("div", { class: "head" },
      el("h3", null, "Combined score · 0–10"),
      el("div", { class: "now" },
        el("strong", null, fmt(cur, 2)),
        el("span", { class: `d delta ${deltaClass(d)}` }, " " + deltaText(d)),
      ),
    ),
    chartSVG(gens.map(g => g.id), combined, { maxY: 10, height: 260, fullLabels: true, markBest: true }),
  );

  const keys = criterionKeys(gens);
  const smallMultiples = el("div", { class: "small-multiples" });
  for (const k of keys) {
    const s = seriesFor(gens, k);
    const c = s[s.length - 1];
    const p = s.length > 1 ? s[s.length - 2] : null;
    const dd = (c != null && p != null) ? c - p : null;
    smallMultiples.appendChild(el("div", { class: "chart-card chart-small" },
      el("div", { class: "head" },
        el("h3", null, prettyKey(k)),
        el("div", { class: "now" },
          el("strong", null, fmt(c, 2)),
          el("span", { class: `d delta ${deltaClass(dd)}` }, dd == null ? "" : ` ${dd>0?"+":""}${dd.toFixed(2)}`),
        ),
      ),
      chartSVG(gens.map(g => g.id), s, { maxY: 1, height: 130, fullLabels: false, markBest: false }),
    ));
  }

  main.appendChild(el("section", { class: "metrics-grid" },
    headlineCard,
    el("div", { class: "chart-card" },
      el("div", { class: "head" }, el("h3", null, "Per-criterion evolution")),
      smallMultiples,
    ),
  ));
}

function chartSVG(labels, values, opts) {
  const { maxY = 10, height = 200, fullLabels = false, markBest = false } = opts || {};
  const w = 1400;
  const pad = { l: 44, r: 24, t: 18, b: 32 };
  const xs = labels.map((_, i) => pad.l + (i * (w - pad.l - pad.r)) / Math.max(labels.length - 1, 1));
  const ys = values.map(v => pad.t + (height - pad.t - pad.b) * (1 - ((v ?? 0) / maxY)));
  const svg = svgNode("svg", { viewBox: `0 0 ${w} ${height}`, preserveAspectRatio: "none" });

  const ticks = maxY === 1 ? [0, 0.25, 0.5, 0.75, 1] : [0, 2, 4, 6, 8, 10];
  for (const t of ticks) {
    const y = pad.t + (height - pad.t - pad.b) * (1 - t / maxY);
    svg.appendChild(svgNode("line", {
      x1: pad.l, x2: w - pad.r, y1: y, y2: y,
      class: t === 0 ? "axis-line" : "axis-line faint",
    }));
    const lbl = svgNode("text", {
      x: pad.l - 8, y: y + 4, "text-anchor": "end", class: "axis-tick",
    });
    lbl.textContent = maxY === 1 ? t.toFixed(2) : String(t);
    svg.appendChild(lbl);
  }

  if (values.some(v => v != null)) {
    const pts = xs.map((x, i) => `${x},${ys[i]}`).join(" ");
    const area = svgNode("polygon", {
      points: `${xs[0]},${height - pad.b} ${pts} ${xs[xs.length - 1]},${height - pad.b}`,
      class: "series-area",
    });
    svg.appendChild(area);
    const line = svgNode("polyline", { points: pts, class: "series-line" });
    svg.appendChild(line);
  }

  let best = -1, bv = -Infinity;
  if (markBest) values.forEach((v, i) => { if (v != null && v > bv) { bv = v; best = i; } });

  values.forEach((v, i) => {
    if (v == null) return;
    svg.appendChild(svgNode("circle", {
      cx: xs[i], cy: ys[i], r: i === best ? 6 : 4,
      class: `series-dot ${i === best ? "best" : ""}`,
    }));
    if (fullLabels) {
      const lbl = svgNode("text", { x: xs[i], y: ys[i] - 12, "text-anchor": "middle", class: "series-value" });
      lbl.textContent = v.toFixed(2);
      svg.appendChild(lbl);
    }
  });

  labels.forEach((lab, i) => {
    const t = svgNode("text", { x: xs[i], y: height - 10, "text-anchor": "middle", class: "axis-tick" });
    t.textContent = lab.replace(/^gen-0*/, "gen ");
    svg.appendChild(t);
  });

  return svg;
}

// ============================================================
// lightbox
// ============================================================
function openLightbox(cand) {
  document.getElementById("lightbox-title").textContent = `${cand.id} · ${cand.combined != null ? cand.combined.toFixed(2) : "—"}`;
  document.getElementById("lightbox-iframe").src = cand.html || "about:blank";
  document.getElementById("lightbox").classList.add("open");
}
function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.getElementById("lightbox-iframe").src = "about:blank";
}
document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });

// ============================================================
// nav + boot
// ============================================================
function setView(v) {
  STATE.view = v;
  stopPlay();
  for (const b of document.querySelectorAll(".nav button")) {
    b.classList.toggle("active", b.dataset.view === v);
  }
  if (v === "evolution") renderEvolution();
  else renderMetrics();
}
for (const b of document.querySelectorAll(".nav button")) {
  b.addEventListener("click", () => setView(b.dataset.view));
}

async function loadRun(rid) {
  stopPlay();
  STATE.runId = rid;
  const m = await jget(`/api/run/${rid}`);
  STATE.manifest = m;
  STATE.scrubIndex = bestIndex(m.generations);
  const bestGen = m.generations[STATE.scrubIndex];
  STATE.candIndex = Math.max(0, bestGen.candidates.findIndex(c => c.id === bestGen.winner));
  // NOTE: do NOT reset STATE.showSaliency — toggle is sticky across run switches too.
  const stat = document.getElementById("meta-stat");
  const wn = winnerOf(bestGen);
  stat.textContent = `${m.generations.length} gens · best ${bestGen.id} · ${wn?.combined?.toFixed(2) ?? "—"}`;
  setView(STATE.view);
}

async function boot() {
  const { runs = [] } = await jget("/api/runs");
  STATE.runs = runs;
  const picker = document.getElementById("run-picker");
  picker.innerHTML = "";
  if (runs.length === 0) {
    document.getElementById("main").innerHTML =
      `<p class="empty">No runs yet. Trigger <code>/autodesign &lt;brief&gt;</code> from chat.</p>`;
    return;
  }
  for (const r of runs) picker.appendChild(el("option", { value: r }, r));
  picker.value = runs[0];
  picker.addEventListener("change", () => loadRun(picker.value));
  await loadRun(runs[0]);
}

boot().catch(err => {
  document.getElementById("main").innerHTML =
    `<p class="empty">Failed to load: ${err.message}. Is dashboard/serve.py running?</p>`;
});
</script>
